substitutions:
  name: cyd-e713b0
  friendly_name: CYD e713b0

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

# ── Logging ───────────────────────────────────────────────────
logger:
#  level: WARN

# ── Home Assistant API ────────────────────────────────────────
api:

# ── OTA ───────────────────────────────────────────────────────
ota:
  - platform: esphome

# ── WiFi ──────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "cyd-e713b0"
    password: "cyd-e713b0"
  reboot_timeout: 0s

captive_portal:
