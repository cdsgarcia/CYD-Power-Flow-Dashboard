# cyd-e713b0-BatteryIconTest.yaml
#
# Battery icon test — shows all 8 glyph levels with names, colors, and SOC ranges.
# Flash to verify icon appearance before adjusting production thresholds/colors.
#
# ── STATIC REFERENCE (top two rows, size 30) ──────────────────────────────
#   Row 1: battery_full | battery_5_bar | battery_4_bar | battery_3_bar
#          Green idx 0-1  |  Blue idx 2-3
#
#   Row 2: battery_2_bar | battery_1_bar | battery_0_bar | battery_alert
#          Yellow idx 4-5  |  Orange idx 6-7
#
# ── LIVE ANIMATIONS (bottom row, 1000ms) ──────────────────────────────────
#   A CHARGE    — step DOWN idx 6→0 (battery filling toward full)
#   B DISCHARGE — step UP   idx 0→6 (battery draining toward empty)
#   C ALERT     — battery_alert flashing on/off 1000ms
#
# Font: gfonts://Material Icons — same as production icon_font_batt

substitutions:
  name: cyd-e713b0
  friendly_name: CYD e713b0

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "cyd-e713b0"
    password: "cyd-e713b0"
  reboot_timeout: 0s

captive_portal:

spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON

display:
  - platform: mipi_spi
    model: ILI9341
    id: lcd_display
    spi_id: tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    auto_clear_enabled: false
    update_interval: never
    invert_colors: false
    color_order: BGR
    dimensions:
      width: 240
      height: 320

globals:
  - id: g_charge_step    # A: current glyph index, steps DOWN toward 0 (charging)
    type: int
    restore_value: false
    initial_value: '6'
  - id: g_discharge_step  # B: current glyph index, steps UP toward 6 (discharging)
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_alert_tick      # C: toggles 0/1 for flash
    type: int
    restore_value: false
    initial_value: '0'

font:
  - file: "gfonts://Roboto"
    id: title_font
    size: 14
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz 0123456789:-"

  - file: "gfonts://Roboto"
    id: label_font
    size: 9
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz 0123456789:-.+%<>"

  # Static reference grid — size 30
  # Font: Material Icons — same as production icon_font_batt
  - file: "gfonts://Material Icons"
    id: icon_batt_sm
    size: 30
    glyphs:
      - "\ue1a4"  # battery_full    — idx 0  Green  ≥98%
      - "\uebd4"  # battery_5_bar   — idx 1  Green  ≥85%
      - "\uebe2"  # battery_4_bar   — idx 2  Blue   ≥70%
      - "\uebdd"  # battery_3_bar   — idx 3  Blue   ≥55%
      - "\uebe0"  # battery_2_bar   — idx 4  Yellow ≥40%
      - "\uebd9"  # battery_1_bar   — idx 5  Yellow ≥25%
      - "\uebdc"  # battery_0_bar   — idx 6  Orange ≥10%
      - "\ue19c"  # battery_alert   — idx 7  Orange <10%

  # Live animation icons — size 44
  # Font: Material Icons — same as production icon_font_batt
  - file: "gfonts://Material Icons"
    id: icon_batt_lg
    size: 44
    glyphs:
      - "\ue1a4"  # battery_full
      - "\uebd4"  # battery_5_bar
      - "\uebe2"  # battery_4_bar
      - "\uebdd"  # battery_3_bar
      - "\uebe0"  # battery_2_bar
      - "\uebd9"  # battery_1_bar
      - "\uebdc"  # battery_0_bar
      - "\ue19c"  # battery_alert

# 1000ms interval drives all 3 live animations.
# A CHARGE:    step DOWN (idx 6→5→4→3→2→1→0→6 repeat) — battery filling
# B DISCHARGE: step UP   (idx 0→1→2→3→4→5→6→0 repeat) — battery draining
# C ALERT:     battery_alert flashing on/off every 1000ms
interval:
  - interval: 1000ms
    then:
      - lambda: |-
          static const char* const GLYPHS[] = {
            "\ue1a4", "\uebd4", "\uebe2", "\uebdd",
            "\uebe0", "\uebd9", "\uebdc", "\ue19c"
          };
          static const uint32_t COLORS[] = {
            0x00FF00, 0x00FF00, 0x0096FF, 0x0096FF,
            0xFFFF00, 0xFFFF00, 0xFFA500, 0xFFA500
          };
          // ── A: Charge — step DOWN toward full (idx 0) ──────────
          int cs = id(g_charge_step) - 1;
          if (cs < 0) cs = 6;  // reached full → restart from 0_bar
          id(g_charge_step) = cs;
          lv_label_set_text(id(live_a_icon), GLYPHS[cs]);
          lv_obj_set_style_text_color(id(live_a_icon), lv_color_hex(COLORS[cs]), 0);
          // ── B: Discharge — step UP toward empty (idx 6) ────────
          int ds = id(g_discharge_step) + 1;
          if (ds > 6) ds = 0;  // reached 0_bar → restart from full
          id(g_discharge_step) = ds;
          lv_label_set_text(id(live_b_icon), GLYPHS[ds]);
          lv_obj_set_style_text_color(id(live_b_icon), lv_color_hex(COLORS[ds]), 0);
          // ── C: Alert — flash on/off ─────────────────────────────
          id(g_alert_tick) = 1 - id(g_alert_tick);
          lv_obj_set_style_opa(id(live_c_icon),
            id(g_alert_tick) ? LV_OPA_COVER : LV_OPA_TRANSP, 0);

lvgl:
  displays:
    - lcd_display
  buffer_size: 25%
  rotation: 270
  pages:
    - id: main_page
      bg_color: 0x000000
      bg_opa: COVER
      scrollable: false
      widgets:

        # ── Title ─────────────────────────────────────────────
        - label:
            x: 0
            y: 2
            width: 320
            text_align: center
            text_color: 0xFFFFFF
            text_font: title_font
            text: "Battery Icon Test"

        # ── ROW 1: idx 0-3  (GREEN 0-1 / BLUE 2-3) ───────────
        # 4 icons × 80px = 320px
        # ── idx 0: battery_full — Green ≥98% ──────────────────
        - label:
            x: 0
            y: 20
            width: 80
            text_align: center
            text_color: 0x00FF00
            text_font: icon_batt_sm
            text: "\ue1a4"
        - label:
            x: 0
            y: 54
            width: 80
            text_align: center
            text_color: 0x888888
            text_font: label_font
            text: "FULL"
        - label:
            x: 0
            y: 64
            width: 80
            text_align: center
            text_color: 0x00FF00
            text_font: label_font
            text: ">=98%"

        # ── idx 1: battery_5_bar — Green ≥85% ─────────────────
        - label:
            x: 80
            y: 20
            width: 80
            text_align: center
            text_color: 0x00FF00
            text_font: icon_batt_sm
            text: "\uebd4"
        - label:
            x: 80
            y: 54
            width: 80
            text_align: center
            text_color: 0x888888
            text_font: label_font
            text: "5 BAR"
        - label:
            x: 80
            y: 64
            width: 80
            text_align: center
            text_color: 0x00FF00
            text_font: label_font
            text: "85-97%"

        # ── idx 2: battery_4_bar — Blue ≥70% ──────────────────
        - label:
            x: 160
            y: 20
            width: 80
            text_align: center
            text_color: 0x0096FF
            text_font: icon_batt_sm
            text: "\uebe2"
        - label:
            x: 160
            y: 54
            width: 80
            text_align: center
            text_color: 0x888888
            text_font: label_font
            text: "4 BAR"
        - label:
            x: 160
            y: 64
            width: 80
            text_align: center
            text_color: 0x0096FF
            text_font: label_font
            text: "70-84%"

        # ── idx 3: battery_3_bar — Blue ≥55% ──────────────────
        - label:
            x: 240
            y: 20
            width: 80
            text_align: center
            text_color: 0x0096FF
            text_font: icon_batt_sm
            text: "\uebdd"
        - label:
            x: 240
            y: 54
            width: 80
            text_align: center
            text_color: 0x888888
            text_font: label_font
            text: "3 BAR"
        - label:
            x: 240
            y: 64
            width: 80
            text_align: center
            text_color: 0x0096FF
            text_font: label_font
            text: "55-69%"

        # ── ROW 2: idx 4-7  (YELLOW 4-5 / ORANGE 6-7) ────────
        # ── idx 4: battery_2_bar — Yellow ≥40% ────────────────
        - label:
            x: 0
            y: 78
            width: 80
            text_align: center
            text_color: 0xFFFF00
            text_font: icon_batt_sm
            text: "\uebe0"
        - label:
            x: 0
            y: 112
            width: 80
            text_align: center
            text_color: 0x888888
            text_font: label_font
            text: "2 BAR"
        - label:
            x: 0
            y: 122
            width: 80
            text_align: center
            text_color: 0xFFFF00
            text_font: label_font
            text: "40-54%"

        # ── idx 5: battery_1_bar — Yellow ≥25% ────────────────
        - label:
            x: 80
            y: 78
            width: 80
            text_align: center
            text_color: 0xFFFF00
            text_font: icon_batt_sm
            text: "\uebd9"
        - label:
            x: 80
            y: 112
            width: 80
            text_align: center
            text_color: 0x888888
            text_font: label_font
            text: "1 BAR"
        - label:
            x: 80
            y: 122
            width: 80
            text_align: center
            text_color: 0xFFFF00
            text_font: label_font
            text: "25-39%"

        # ── idx 6: battery_0_bar — Orange ≥10% ────────────────
        - label:
            x: 160
            y: 78
            width: 80
            text_align: center
            text_color: 0xFFA500
            text_font: icon_batt_sm
            text: "\uebdc"
        - label:
            x: 160
            y: 112
            width: 80
            text_align: center
            text_color: 0x888888
            text_font: label_font
            text: "0 BAR"
        - label:
            x: 160
            y: 122
            width: 80
            text_align: center
            text_color: 0xFFA500
            text_font: label_font
            text: "10-24%"

        # ── idx 7: battery_alert — Orange <10% ────────────────
        - label:
            x: 240
            y: 78
            width: 80
            text_align: center
            text_color: 0xFFA500
            text_font: icon_batt_sm
            text: "\ue19c"
        - label:
            x: 240
            y: 112
            width: 80
            text_align: center
            text_color: 0x888888
            text_font: label_font
            text: "ALERT"
        - label:
            x: 240
            y: 122
            width: 80
            text_align: center
            text_color: 0xFFA500
            text_font: label_font
            text: "<=10%"

        # ── Divider: LIVE OPTIONS ─────────────────────────────
        - label:
            x: 0
            y: 136
            width: 320
            text_align: center
            text_color: 0xFFFFFF
            text_font: title_font
            text: "LIVE ANIMATIONS - 1000ms"

        # ── 3 live icons (size 44) ────────────────────────────
        # A: Charge — steps DOWN (idx 6→0→6)
        - label:
            id: live_a_icon
            x: 0
            y: 153
            width: 106
            text_align: center
            text_color: 0x0096FF
            text_font: icon_batt_lg
            text: "\uebdc"
        - label:
            x: 0
            y: 201
            width: 106
            text_align: center
            text_color: 0xFFFFFF
            text_font: label_font
            text: "A: CHARGE"
        - label:
            x: 0
            y: 213
            width: 106
            text_align: center
            text_color: 0x888888
            text_font: label_font
            text: "idx 6 to 0"

        # B: Discharge — steps UP (idx 0→6→0)
        - label:
            id: live_b_icon
            x: 107
            y: 153
            width: 106
            text_align: center
            text_color: 0x00FF00
            text_font: icon_batt_lg
            text: "\ue1a4"
        - label:
            x: 107
            y: 201
            width: 106
            text_align: center
            text_color: 0xFFFFFF
            text_font: label_font
            text: "B: DISCHARGE"
        - label:
            x: 107
            y: 213
            width: 106
            text_align: center
            text_color: 0x888888
            text_font: label_font
            text: "idx 0 to 6"

        # C: Alert — battery_alert flashing on/off
        - label:
            id: live_c_icon
            x: 214
            y: 153
            width: 106
            text_align: center
            text_color: 0xFFA500
            text_font: icon_batt_lg
            text: "\ue19c"
        - label:
            x: 214
            y: 201
            width: 106
            text_align: center
            text_color: 0xFFFFFF
            text_font: label_font
            text: "C: ALERT"
        - label:
            x: 214
            y: 213
            width: 106
            text_align: center
            text_color: 0x888888
            text_font: label_font
            text: "flash on/off"
