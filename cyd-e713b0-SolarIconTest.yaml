# cyd-e713b0-SolarIconTest.yaml
#
# Solar icon test — shows all 3 animation states with glyphs, names, colors, and live animations.
# Flash to verify solar icon appearance before adjusting production thresholds/colors.
#
# ── STATIC REFERENCE ───────────────────────────────────────────────────────────
#   STATE 0: wb_cloudy (Grey 0x888888, static)       — daytime, no production
#   STATE 1: Sun ping-pong, 8 glyphs (Yellow 0xFFFF00, 2s/step)
#            s:0 solar_power → s:1 brt_7 → s:2 brt_4 → s:3 brt_6 → s:4 brt_5
#            → s:5 brt_6 → s:6 brt_4 → s:7 brt_7 → (repeat from s:1)
#   STATE 2: Moon cycle, 5 glyphs (Blue 0x0096FF, 2s/step)
#            s:0 nights_stay → s:1 moon_stars → s:2 star_shine
#            → s:3 auto_awe → s:4 flare → (repeat from s:1)
#
# ── LIVE ANIMATIONS (2000ms/step) ─────────────────────────────────────────────
#   A: State 1 — Sun ping-pong  (Yellow, gfonts://Material Icons)
#   B: State 2 — Moon cycle     (Blue,   gfonts://Material Symbols Outlined)
#   C: State 0 — Static cloudy  (Grey,   no animation)
#
# State 2 uses a separate font widget (Material Symbols Outlined) because moon_stars
# and star_shine codepoints do not exist in Material Icons — same dual-widget design as production.
#
# Font: icon_solar_sm / icon_solar_lg — gfonts://Material Icons
#       icon_moon_sm  / icon_moon_lg  — gfonts://Material Symbols Outlined

substitutions:
  name: cyd-e713b0
  friendly_name: CYD e713b0

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "cyd-e713b0"
    password: "cyd-e713b0"
  reboot_timeout: 0s

captive_portal:

spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON

display:
  - platform: mipi_spi
    model: ILI9341
    id: lcd_display
    spi_id: tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    auto_clear_enabled: false
    update_interval: never
    invert_colors: false
    color_order: BGR
    dimensions:
      width: 240
      height: 320

globals:
  - id: g_sun_step   # State 1 sun ping-pong step (0-7); increments each interval tick
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_moon_step  # State 2 moon cycle step (0-4); increments each interval tick
    type: int
    restore_value: false
    initial_value: '0'

font:
  - file: "gfonts://Roboto"
    id: title_font
    size: 14
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz 0123456789-"

  - file: "gfonts://Roboto"
    id: label_font
    size: 9
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz 0123456789:-"

  # Static reference grid — size 22, Material Icons
  # State 0 (wb_cloudy) + State 1 sun ping-pong glyphs (5 unique glyphs)
  - file: "gfonts://Material Icons"
    id: icon_solar_sm
    size: 22
    glyphs:
      - "\ue42d"  # wb_cloudy    — State 0 static (daytime, no production)
      - "\uec0f"  # solar_power  — State 1 step 0
      - "\ue3ac"  # brightness_7 — State 1 step 1/7
      - "\ue3a9"  # brightness_4 — State 1 step 2/6
      - "\ue3ab"  # brightness_6 — State 1 step 3/5
      - "\ue3aa"  # brightness_5 — State 1 step 4 (peak)

  # Static reference grid — size 22, Material Symbols Outlined
  # State 2 moon cycle glyphs (moon_stars/star_shine not in Material Icons)
  - file: "gfonts://Material Symbols Outlined"
    id: icon_moon_sm
    size: 22
    glyphs:
      - "\uf174"  # nights_stay  — State 2 step 0
      - "\uf34f"  # moon_stars   — State 2 step 1
      - "\uf31d"  # star_shine   — State 2 step 2
      - "\ue65f"  # auto_awesome — State 2 step 3
      - "\ue3e4"  # flare        — State 2 step 4

  # Live animation icons — size 28, Material Icons (State 1 sun + State 0 cloudy)
  - file: "gfonts://Material Icons"
    id: icon_solar_lg
    size: 28
    glyphs:
      - "\ue42d"  # wb_cloudy
      - "\uec0f"  # solar_power
      - "\ue3ac"  # brightness_7
      - "\ue3a9"  # brightness_4
      - "\ue3ab"  # brightness_6
      - "\ue3aa"  # brightness_5

  # Live animation icons — size 28, Material Symbols Outlined (State 2 moon)
  - file: "gfonts://Material Symbols Outlined"
    id: icon_moon_lg
    size: 28
    glyphs:
      - "\uf174"  # nights_stay
      - "\uf34f"  # moon_stars
      - "\uf31d"  # star_shine
      - "\ue65f"  # auto_awesome
      - "\ue3e4"  # flare

# 2000ms interval matches production rate: 250ms tick × s_tick%8==0 = 2s/step
# A: State 1 sun ping-pong   — cycles 8 glyphs in sequence (Yellow)
# B: State 2 moon cycle      — cycles 5 glyphs in sequence (Blue)
# C: State 0 static cloudy   — no update needed (static wb_cloudy, Grey)
interval:
  - interval: 2000ms
    then:
      - lambda: |-
          // ── A: Sun ping-pong (State 1, 8 steps) ───────────────
          static const char* const SUN_GLYPHS[] = {
            "\uec0f", "\ue3ac", "\ue3a9", "\ue3ab",
            "\ue3aa", "\ue3ab", "\ue3a9", "\ue3ac"
          };
          int ss = (id(g_sun_step) + 1) % 8;
          id(g_sun_step) = ss;
          lv_label_set_text(id(live_sun_icon), SUN_GLYPHS[ss]);
          lv_obj_set_style_text_color(id(live_sun_icon), lv_color_hex(0xFFFF00), 0);
          // ── B: Moon cycle (State 2, 5 steps) ───────────────────
          static const char* const MOON_GLYPHS[] = {
            "\uf174", "\uf34f", "\uf31d", "\ue65f", "\ue3e4"
          };
          int ms = (id(g_moon_step) + 1) % 5;
          id(g_moon_step) = ms;
          lv_label_set_text(id(live_moon_icon), MOON_GLYPHS[ms]);
          lv_obj_set_style_text_color(id(live_moon_icon), lv_color_hex(0x0096FF), 0);
          // ── C: State 0 is static — no update needed ────────────

