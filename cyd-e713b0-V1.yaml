substitutions:
  name: cyd-e713b0
  friendly_name: CYD e713b0

  # ============================================================
  #  POWER FLOW SENSORS — update entity IDs to match your HA
  # ============================================================
  solar_entity:   "sensor.srne_pv_power"
  a_c_entity:     "sensor.a_c_1f_power_meter_power"
  battery_entity: "sensor.battery_soc_mean"
  home_entity:    "sensor.srne_load_l1_apparent_power"


esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  on_boot:
    priority: -10
    then:
      - light.turn_on:
          id: backlight
          brightness: !lambda 'return id(display_brightness).state / 100.0f;'

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# ── Fonts ─────────────────────────────────────────────────────
font:
  - file: "gfonts://Roboto"
    id: header_font
    size: 36
    glyphs: "0123456789:/ abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ"
  - file: "gfonts://Material Icons"
    id: icon_font
    size: 48
    glyphs: [
      "\uec0f",  # solar_power
      "\ueb3b",  # ac_unit (snowflake — A/C)
      "\ue1a4",  # battery_full
      "\uebd4",  # battery_5_bar
      "\uebe2",  # battery_4_bar
      "\uebdd",  # battery_3_bar
      "\uebe0",  # battery_2_bar
      "\uebd9",  # battery_1_bar
      "\uebdc",  # battery_0_bar
      "\ue19c",  # battery_alert
      "\ue88a",  # home
    ]
  - file: "gfonts://Roboto"
    id: value_font
    size: 48
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz .%+-"
  - file: "gfonts://Roboto"
    id: label_font
    size: 14
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz .%/+-"

# ── Time ──────────────────────────────────────────────────────
time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - seconds: /1
        then:
          - lvgl.label.update:
              id: lbl_time
              text: !lambda |-
                auto now = id(ha_time).now();
                if (!now.is_valid()) return std::string("--:--:-- --");
                int h = now.hour;
                const char* ampm = (h >= 12) ? "pm" : "am";
                if (h == 0) h = 12;
                else if (h > 12) h -= 12;
                return str_sprintf("%d:%02d:%02d %s", h, now.minute, now.second, ampm);

# ── Power Flow Sensors ────────────────────────────────────────
sensor:
  - platform: homeassistant
    id: ha_solar
    entity_id: ${solar_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: val_solar
            text: !lambda |-
             if (x >= 1000) return str_sprintf("%.2f", x / 1000.0f);
              return str_sprintf("%.0f", x);
            text_color: !lambda |-
              if (x > 2000) return lv_color_hex(0xFFA500);
              if (x > 0)    return lv_color_hex(0xFFD700);
              return lv_color_hex(0x555555);
        - lvgl.label.update:
            id: val_solar_unit
            text: !lambda 'return (x >= 1000) ? std::string("kW") : std::string("W");'

  - platform: homeassistant
    id: ha_grid
    entity_id: ${a_c_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: val_grid
            text: !lambda |-
             if (x >= 1000) return str_sprintf("%.2f", x / 1000.0f);
              return str_sprintf("%.0f", x);
            text_color: !lambda |-
              if (x > 2000) return lv_color_hex(0xFF5252);
              if (x > 0)    return lv_color_hex(0x64D8FF);
              return lv_color_hex(0x555555);
        - lvgl.label.update:
            id: val_grid_unit
            text: !lambda 'return (x >= 1000) ? std::string("kW") : std::string("W");'

  - platform: homeassistant
    id: ha_battery
    entity_id: ${battery_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: val_battery
            text: !lambda 'return str_sprintf("%.0f", x);'
        - lvgl.label.update:
            id: icon_battery
            text: !lambda |-
              if (x >= 98) return "\ue1a4";
              if (x >= 85) return "\uebd4";
              if (x >= 70) return "\uebe2";
              if (x >= 55) return "\uebdd";
              if (x >= 40) return "\uebe0";
              if (x >= 25) return "\uebd9";
              if (x >= 10) return "\uebdc";
              return "\ue19c";
        - lvgl.label.update:
            id: icon_battery
            text_color: !lambda |-
              if (x >= 75) return lv_color_hex(0x00C853);
              if (x >= 30) return lv_color_hex(0xFFA500);
              return lv_color_hex(0xFF5252);

  - platform: homeassistant
    id: ha_home
    entity_id: ${home_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: val_home
            text: !lambda |-
             if (x >= 1000) return str_sprintf("%.2f", x / 1000.0f);
              return str_sprintf("%.0f", x);
        - lvgl.label.update:
            id: val_home_unit
            text: !lambda 'return (x >= 1000) ? std::string("kVA") : std::string("VA");'

# ── Hardware ──────────────────────────────────────────────────
spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0.5s

display:
  - platform: ili9xxx
    model: ILI9341
    id: lcd_display
    spi_id: tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    auto_clear_enabled: false
    update_interval: never
    invert_colors: false
    color_order: RGB
    dimensions:
      width: 240
      height: 320

touchscreen:
  - platform: xpt2046
    id: touch_panel
    spi_id: touch
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    calibration:
      x_min: 220
      x_max: 3756
      y_min: 394
      y_max: 3749
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: true


# ── Brightness Control (HA) ───────────────────────────────────
number:
  - platform: template
    name: "Display Brightness"
    id: display_brightness
    min_value: 20
    max_value: 100
    step: 10
    initial_value: 50
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    on_value:
      then:
        - light.turn_on:
            id: backlight
            brightness: !lambda 'return x / 100.0f;'
            transition_length: 300ms

# ── LVGL UI ───────────────────────────────────────────────────
# LVGL rotation: 90 → canvas becomes 320×240 (full landscape, no gaps)
lvgl:
  displays:
    - lcd_display
  touchscreens:
    - touch_panel
  buffer_size: 25%
  rotation: 90
  pages:
    - id: main_page
      bg_color: 0x000000
      bg_opa: COVER
      widgets:

        # ── Header: Time ────────────────────────────────────
        - label:
            id: lbl_time
            text: "--:--:-- --"
            text_font: header_font
            text_color: 0xFFFFFF
            align: TOP_MID
            y: 0

        # ── Divider Horizontal ──────────────────────────────
        - line:
            points:
              - 0, 0
              - 320, 0
            line_color: 0x333333
            line_width: 2

        - line:
            points:
              - 0, 40
              - 320, 40
            line_color: 0x333333
            line_width: 1
        
        - line:
            points:
              - 0, 140
              - 320, 140
            line_color: 0x333333
            line_width: 1
        
        - line:
            points:
              - 0, 240
              - 320, 240
            line_color: 0x333333
            line_width: 2
        

        # ── Divider Vertical ──────────────────────────────
        
        - line:
            points:
              - 0, 0
              - 0, 240
            line_color: 0x333333
            line_width: 2
        
        - line:
            points:
              - 160, 40
              - 160, 240
            line_color: 0x333333
            line_width: 1
        
        - line:
            points:
              - 320, 0
              - 320, 240
            line_color: 0x333333
            line_width: 2


        # ── Solar (top-left) ────────────────────────────────
        - obj:
            x: 0
            y: 40
            width: 160
            height: 100
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  id: icon_solar
                  text: "\uec0f"
                  text_font: icon_font
                  text_color: 0xFFD700
                  align: LEFT_MID
                  x: 0
              - label:
                  text: "PV"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: 24
                  y: -32
              - label:
                  id: val_solar
                  text: "--"
                  text_font: value_font
                  text_color: 0x555555
                  align: CENTER
                  x: 24
                  y: 0
              - label:
                  id: val_solar_unit
                  text: "W"
                  text_font: label_font
                  text_color: 0x666666
                  align: CENTER
                  x: 24
                  y: 32

        # ── A/C Power (top-right) ───────────────────────────
        - obj:
            x: 160
            y: 40
            width: 160
            height: 100
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  id: icon_grid
                  text: "\ueb3b"
                  text_font: icon_font
                  text_color: 0x64D8FF
                  align: LEFT_MID
                  x: 0
              - label:
                  text: "A/C 1F"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: 24
                  y: -32
              - label:
                  id: val_grid
                  text: "--"
                  text_font: value_font
                  text_color: 0x555555
                  align: CENTER
                  x: 24
                  y: 0
              - label:
                  id: val_grid_unit
                  text: "W"
                  text_font: label_font
                  text_color: 0x666666
                  align: CENTER
                  x: 24
                  y: 32

        # ── Battery (bottom-left) ───────────────────────────
        - obj:
            x: 0
            y: 140
            width: 160
            height: 100
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  id: icon_battery
                  text: "\uebd2"
                  text_font: icon_font
                  text_color: 0x00C853
                  align: LEFT_MID
                  x: 0
              - label:
                  text: "BATTERY"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: 24
                  y: -32
              - label:
                  id: val_battery
                  text: "--"
                  text_font: value_font
                  text_color: 0x00C853
                  align: CENTER
                  x: 24
                  y: 0
              - label:
                  text: "%"
                  text_font: label_font
                  text_color: 0x666666
                  align: CENTER
                  x: 24
                  y: 32

        # ── Home Consumption (bottom-right) ─────────────────
        - obj:
            x: 160
            y: 140
            width: 160
            height: 100
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  text: "\ue88a"
                  text_font: icon_font
                  text_color: 0x64B5F6
                  align: LEFT_MID
                  x: 0
              - label:
                  text: "LOAD"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: 24
                  y: -32
              - label:
                  id: val_home
                  text: "--"
                  text_font: value_font
                  text_color: 0xFFFFFF
                  align: CENTER
                  x: 24
                  y: 0
              - label:
                  id: val_home_unit
                  text: "VA"
                  text_font: label_font
                  text_color: 0x666666
                  align: CENTER
                  x: 24
                  y: 32