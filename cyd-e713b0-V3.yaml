# ── Time ──────────────────────────────────────────────────────
time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - seconds: /1
        then:
          - lvgl.label.update:
              id: lbl_time
              text: !lambda |-
                auto now = id(ha_time).now();
                if (!now.is_valid()) return std::string("--:--:-- --");
                int h = now.hour;
                const char* ampm = (h >= 12) ? "PM" : "AM";
                if (h == 0) h = 12;
                else if (h > 12) h -= 12;
                return str_sprintf("%d:%02d:%02d %s", h, now.minute, now.second, ampm);

# ── Sensors ──────────────────────────────────────────────────
sensor:
  # ── WiFi Signal ───────────────────────────────────────────
  - platform: wifi_signal
    name: Signal strength
    update_interval: 300s

  # ── Power Flow ────────────────────────────────────────────
  - platform: homeassistant
    id: ha_solar
    entity_id: ${solar_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: val_solar
            text: !lambda |-
              if (x >= 1000) return str_sprintf("%.2f", x / 1000.0f);
              if (x >= 100) return str_sprintf("%.0f", x);
              if (x >= 10) return str_sprintf("%.1f", x);
              return str_sprintf("%.2f", x);
            text_color: !lambda |-
              if (x > 3600) return lv_color_hex(0x00FF00);
              if (x > 2000) return lv_color_hex(0x0096FF);
              if (x > 900)  return lv_color_hex(0xFFFF00);
              return lv_color_hex(0xFFA500);
        - lvgl.label.update:
            id: icon_solar
            text_color: !lambda |-
              if (x > 3600) return lv_color_hex(0x00FF00);
              if (x > 2000) return lv_color_hex(0x0096FF);
              if (x > 900)  return lv_color_hex(0xFFFF00);
              return lv_color_hex(0xFFA500);
        - lvgl.label.update:
            id: val_solar_unit
            text: !lambda 'return (x >= 1000) ? std::string("kW") : std::string("W");'

  - platform: homeassistant
    id: ha_a_c
    entity_id: ${a_c_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: val_a_c
            text: !lambda |-
              if (x >= 1000) return str_sprintf("%.2f", x / 1000.0f);
              if (x >= 100) return str_sprintf("%.0f", x);
              if (x >= 10) return str_sprintf("%.1f", x);
              return str_sprintf("%.2f", x);
            text_color: !lambda |-
              if (x < 700) return lv_color_hex(0x00FF00);
              if (x < 1000) return lv_color_hex(0x0096FF);
              if (x < 1200) return lv_color_hex(0xFFFF00);
              return lv_color_hex(0xFFA500);
        - lvgl.label.update:
            id: icon_a_c
            text_color: !lambda |-
              if (x < 700) return lv_color_hex(0x00FF00);
              if (x < 1000) return lv_color_hex(0x0096FF);
              if (x < 1200) return lv_color_hex(0xFFFF00);
              return lv_color_hex(0xFFA500);
        - lvgl.label.update:
            id: val_a_c_unit
            text: !lambda 'return (x >= 1000) ? std::string("kW") : std::string("W");'

  - platform: homeassistant
    id: ha_home
    entity_id: ${home_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: val_home
            text: !lambda |-
              if (x >= 1000) return str_sprintf("%.2f", x / 1000.0f);
              if (x >= 100) return str_sprintf("%.0f", x);
              if (x >= 10) return str_sprintf("%.1f", x);
              return str_sprintf("%.2f", x);
            text_color: !lambda |-
              if (x < 1000) return lv_color_hex(0x00FF00);
              if (x < 2000) return lv_color_hex(0x0096FF);
              if (x < 3000) return lv_color_hex(0xFFFF00);
              return lv_color_hex(0xFFA500);
        - lvgl.label.update:
            id: icon_home
            text_color: !lambda |-
              if (x < 1000) return lv_color_hex(0x00FF00);
              if (x < 2000) return lv_color_hex(0x0096FF);
              if (x < 3000) return lv_color_hex(0xFFFF00);
              return lv_color_hex(0xFFA500);
        - lvgl.label.update:
            id: val_home_unit
            text: !lambda 'return (x >= 1000) ? std::string("kVA") : std::string("VA");'

  - platform: homeassistant
    id: ha_battery
    entity_id: ${battery_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: icon_battery
            text: !lambda |-
              if (x >= 98) return "\ue1a4";
              if (x >= 85) return "\uebd4";
              if (x >= 70) return "\uebe2";
              if (x >= 55) return "\uebdd";
              if (x >= 40) return "\uebe0";
              if (x >= 25) return "\uebd9";
              if (x >= 10) return "\uebdc";
              return "\ue19c";
            text_color: !lambda |-
              if (x >= 80) return lv_color_hex(0x00FF00);
              if (x >= 50) return lv_color_hex(0x0096FF);
              if (x >= 30) return lv_color_hex(0xFFFF00);
              return lv_color_hex(0xFFA500);
        - lvgl.label.update:
            id: val_battery
            text: !lambda |-
              if (x >= 100) return str_sprintf("%.0f", x);
              if (x >= 10) return str_sprintf("%.1f", x);
              return str_sprintf("%.2f", x);
            text_color: !lambda |-
              if (x >= 80) return lv_color_hex(0x00FF00);
              if (x >= 50) return lv_color_hex(0x0096FF);
              if (x >= 30) return lv_color_hex(0xFFFF00);
              return lv_color_hex(0xFFA500);

  - platform: homeassistant
    id: ha_battery_power
    entity_id: ${battery_power_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: val_battery_power
            text: !lambda |-
              if (x >= 1000 || x <= -1000) return str_sprintf("%.2f", x / 1000.0f);
              if (x >= 100 || x <= -100) return str_sprintf("%.0f", x);
              if (x >= 10 || x <= -10) return str_sprintf("%.1f", x);
              return str_sprintf("%.2f", x);
            text_color: !lambda |-
              if (x >= 2500) return lv_color_hex(0x00FF00);
              if (x >= 500) return lv_color_hex(0x0096FF);
              if (x >= 0) return lv_color_hex(0xFFFF00);
              return lv_color_hex(0xFFA500);
        - lvgl.label.update:
            id: val_battery_power_unit
            text: !lambda |-
              return (x >= 1000 || x <= -1000) ? std::string("kW") : std::string("W");

# ── Hardware ──────────────────────────────────────────────────
spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0.5s

display:
  - platform: mipi_spi
    model: ILI9341
    id: lcd_display
    spi_id: tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    auto_clear_enabled: false
    update_interval: never
    invert_colors: false
    color_order: BGR
    dimensions:
      width: 240
      height: 320

# ── HTTP (required by online_image) ──────────────────────────
http_request:
  useragent: esphome/${name}
  timeout: 10s

# ── Screensaver Image ─────────────────────────────────────────
# transparency: chroma_key enables LV_DRAW_SW_SUPPORT_RGB565A8 in lv_conf.h,
# which is required for the SW renderer to scale RGB565 images (scale: 2.0).
# Initial URL is 00.jpg (non-existent) so the first real URL always triggers
# a download (set_url skips fetch if URL is unchanged).
online_image:
  - id: ss_img
    url: "${ha_url}/local/screensaver/00.jpg"
    format: JPEG
    type: RGB565
    transparency: chroma_key
    update_interval: never
    on_download_finished:
      then:
        - if:
            condition:
              lambda: 'return id(g_screensaver);'
            then:
              - lvgl.image.update:
                  id: ss_img_widget
                  src: ss_img
              - lambda: |-
                  if (id(ss_transition).current_option() == "Fade" ||
                      id(ss_transition).current_option() == "Random") {
                    lv_anim_del(id(ss_img_widget), NULL);
                    lv_anim_t a;
                    lv_anim_init(&a);
                    lv_anim_set_var(&a, id(ss_img_widget));
                    lv_anim_set_exec_cb(&a, [](void* obj, int32_t v) {
                      lv_obj_set_style_opa((lv_obj_t*)obj, v, 0);
                    });
                    lv_anim_set_values(&a, LV_OPA_TRANSP, LV_OPA_COVER);
                    lv_anim_set_duration(&a, 500);
                    lv_anim_start(&a);
                  } else {
                    lv_obj_set_style_opa(id(ss_img_widget), LV_OPA_COVER, 0);
                  }
    on_error:
      then:
        - lambda: |-
            int photo_num = (!id(g_photo_order).empty() &&
                             id(g_photo_idx) < (int)id(g_photo_order).size())
              ? id(g_photo_order)[id(g_photo_idx)] : id(g_photo_idx) + 1;
            ESP_LOGW("ss", "Screensaver: photo %02d fetch failed", photo_num);

# ── 1s State Machine (Powerflow ↔ Screensaver) ───────────────
interval:
  - interval: 1s
    then:
      - lambda: |-
          if (!id(g_screensaver)) {
            if (--id(g_pf_secs) <= 0) {
              if ((int)id(ss_photo_count).state > 0) {
                id(activate_screensaver).execute();
              } else {
                id(g_pf_secs) = (int)(id(ss_powerflow_mins).state * 60.0f);
              }
            }
          } else {
            if (--id(g_photo_secs) <= 0) {
              id(g_photo_idx)++;
              if (id(g_photo_idx) >= (int)id(g_photo_order).size()) {
                id(deactivate_screensaver).execute();
              } else {
                if (id(ss_transition).current_option() == "Fade" ||
                    id(ss_transition).current_option() == "Random")
                  lv_obj_set_style_opa(id(ss_img_widget), LV_OPA_TRANSP, 0);
                id(g_photo_secs) = (int)id(ss_photo_secs).state;
                int photo_num = id(g_photo_order)[id(g_photo_idx)];
                char url[80];
                snprintf(url, sizeof(url),
                  "${ha_url}/local/screensaver/%02d.jpg", photo_num);
                const char* eff = (id(ss_transition).current_option() == "Fade" ||
                                   id(ss_transition).current_option() == "Random")
                                  ? "Fade" : "None";
                ESP_LOGW("ss", "Screensaver → photo %d [%s] — fetching %s",
                  photo_num, eff, url);
                id(ss_img).set_url(url);
                id(ss_img).update();
              }
            }
          }

# ── Display & Screensaver Controls (HA) ──────────────────────
number:
  - platform: template
    name: "Display Brightness"
    id: display_brightness
    entity_category: config
    min_value: 20
    max_value: 100
    step: 10
    initial_value: 50
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    on_value:
      then:
        - light.turn_on:
            id: backlight
            brightness: !lambda 'return x / 100.0f;'
            transition_length: 300ms

  - platform: template
    name: "Powerflow Mins"
    id: ss_powerflow_mins
    entity_category: config
    mode: box
    min_value: 1
    max_value: 15
    step: 1
    initial_value: 1
    restore_value: true
    optimistic: true
    unit_of_measurement: "min"
    on_value:
      then:
        - lambda: |-
            if (!id(g_screensaver))
              id(g_pf_secs) = (int)(x * 60.0f);

  - platform: template
    name: "Photo Secs"
    id: ss_photo_secs
    entity_category: config
    mode: box
    min_value: 1
    max_value: 6
    step: 1
    initial_value: 3
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"

  - platform: template
    name: "Photo Count"
    id: ss_photo_count
    entity_category: config
    mode: box
    min_value: 0
    max_value: 20
    step: 1
    initial_value: 0
    restore_value: true
    optimistic: true

# ── Select Controls (HA) ──────────────────────────────────────
select:
  - platform: template
    name: "Transition Effect"
    id: ss_transition
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "Random"
    options:
      - "None"
      - "Fade"
      - "Slide Left"
      - "Slide Right"
      - "Slide Up"
      - "Slide Down"
      - "Random"

  - platform: template
    name: "Photo Order"
    id: ss_photo_order
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "Random"
    options:
      - "Sequential"
      - "Random"

# ── LVGL UI ───────────────────────────────────────────────────
# LVGL rotation: 270 → canvas becomes
# 320×240 (full landscape, no gaps)
# text_color: 0xFFFFFF # Standard, White
# text_color: 0x00FF00 # Standard, Green
# text_color: 0xFFFF00 # Standard, Yellow
# text_color: 0xFF0000 # Standard, Red
# text_color: 0xFF2400 # Scarlet
# text_color: 0xFFA500 # Standard, Orange
# text_color: 0x0096FF # Bright Blue
# ──────────────────────────────────────────────────────────────

lvgl:
  displays:
    - lcd_display
  buffer_size: 25%
  rotation: 270
  pages:
    - id: main_page
      bg_color: 0x000000
      bg_opa: COVER
      scrollable: false
      widgets:

        # ── Header: Time ──────────────────────────────────────
        - label:
            id: lbl_time
            text: "88:88:88 88"
            text_font: header_font
            text_color: 0xFFFFFF
            align: CENTER
            y: -106

        # ── Divider Horizontal ────────────────────────────────
        - line:
            points:
              - 0, 34
              - 320, 34
            line_color: 0x333333
            line_width: 1

        # ── Battery Power (middle) ────────────────────────────
        - obj:
            x: 0
            y: 18
            width: 320
            height: 200
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            align: CENTER
            scrollable: false
            widgets:
              - label:
                  text: "Battery Power"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  y: -26
              - label:
                  id: val_battery_power
                  text: "8.88"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
