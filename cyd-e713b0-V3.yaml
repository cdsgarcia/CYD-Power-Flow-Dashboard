  - file: "gfonts://Roboto"
    id: value_font
    size: 50
    glyphs: "0123456789.-"
  - file: "gfonts://Roboto"
    id: label_font
    size: 12
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz .%/+-"
  - file: "gfonts://Material Icons"
    id: icon_font
