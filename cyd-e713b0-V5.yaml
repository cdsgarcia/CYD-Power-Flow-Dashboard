            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  id: icon_solar
                  text: "\uec0f"
                  text_font: icon_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: -55
              - label:
                  text: "Solar Power"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: 20
                  y: -26
              - label:
                  id: val_solar
                  text: "8.88"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: 20
                  y: 0
              - label:
                  id: val_solar_unit
                  text: "W"
                  text_font: label_font
                  text_color: 0xFFFFFF
                  align: CENTER
                  x: 20
                  y: 26

        # ── Battery (bottom-left) ─────────────────────────────
        - obj:
            x: 0
            y: 160
            width: 160
            height: 95
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  id: icon_battery
                  text: "\ue1a4"
                  text_font: icon_font_batt
                  text_color: 0xFFFF00
                  align: CENTER
                  x: -60
                  y: -10
              - label:
                  text: "Battery SOC"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: 20
                  y: -26
              - label:
                  id: val_battery
                  text: "88.8"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: 20
                  y: 0
              - label:
                  text: "%"
                  text_font: label_font
                  text_color: 0xFFFFFF
                  align: CENTER
                  x: 20
                  y: 26

        # ── Home Load Slots (top-right) — cycles: Load 2 → Load 3 → Load 1 ──
        # Slot visible only when sensor value > threshold (Load 1 always shown).
        # Icon and labels are updated by update_slot_display script.
        - obj:
            x: 160
            y: 25
            width: 160
            height: 95
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              # Slot icon — shown for Load 2 and Load 3 slots (default: snowflake \ueb3b; change in icon_font glyphs + here)
              - label:
                  id: icon_slot
                  text: "\ueb3b"
                  text_font: icon_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: 55
              # Load 1 icon (Material Icons electrical_services \ue63c) — shown for Load 1 Power slot
              # Replace with a different glyph codepoint and add it to icon_font glyphs list
              - label:
                  id: icon_load1
                  text: "\ue63c"
                  text_font: icon_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: 55
                  hidden: true
              - label:
                  id: lbl_slot
                  text: "Load 2"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: -20
                  y: -26
              - label:
                  id: val_slot
                  text: "8.88"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: -20
                  y: 0
              - label:
                  id: val_slot_unit
                  text: "W"
                  text_font: label_font
                  text_color: 0xFFFFFF
                  align: CENTER
                  x: -20
                  y: 26

        # ── Home Load (bottom-right) ─────────────────────────
        - obj:
            x: 160
            y: 160
            width: 160
            height: 95
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  id: icon_home
                  text: "\ue88a"
                  text_font: icon_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: 55
              - label:
                  text: "Home Load"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: -20
                  y: -26
              - label:
                  id: val_home
                  text: "8.88"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: -20
                  y: 0
              - label:
                  id: val_home_unit
                  text: "VA"
                  text_font: label_font
                  text_color: 0xFFFFFF
                  align: CENTER
                  x: -20
                  y: 26

    # ── Screensaver Page ──────────────────────────────────────
    # Black canvas. scale: 2.5 upscales a 128×96 photo to fill
    # the full 320×240 screen (128×2.5=320, 96×2.5=240 exact).
    # antialias: false avoids heavy SW transform work that would
    # trigger the 30ms loop warning.
    - id: screensaver_page
      bg_color: 0x000000
      bg_opa: COVER
      scrollable: false
      widgets:
        - image:
            id: ss_img_widget
            src: ss_img
            align: CENTER
            scale: 2.5
            antialias: false
