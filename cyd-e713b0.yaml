# ─────────────────────────────────────────────────────────────────────────────
# cyd-e713b0.yaml — Production ESPHome config for CYD ESP32 (ILI9341 240×320)
#
# Renders a Home Assistant power flow dashboard in 320×240 landscape (LVGL 270°).
# Idle: transitions to a photo screensaver with configurable transitions/order.
#
# ▸ Flash:   esphome run cyd-e713b0.yaml
# ▸ OTA:     esphome upload cyd-e713b0.yaml
# ▸ Validate: esphome config cyd-e713b0.yaml
#
# Credentials in secrets.yaml (not committed):
#   wifi_ssid / wifi_password / wifi_ssid2 / wifi_password2
#   ha_url is in substitutions below
# ─────────────────────────────────────────────────────────────────────────────
substitutions:
  name: cyd-e713b0
  friendly_name: CYD e713b0
  # ────────────────────────────────────────────────────────────
  #  POWER FLOW SENSORS — update entity IDs to match your HA
  #  solar_entity              → SRNE PV power
  #  load2_entity              → Load 2 sensor
  #  load3_entity              → Load 3 sensor
  #  load1_entity              → Load 1 sensor
  #  battery_entity            → battery SOC mean (%)
  #  home_entity               → home load apparent power
  #  battery_power_entity      → total battery power (can be negative)
  #  batt_current_entity       → total battery current (A, + = charging, - = discharging)
  #  srne_charge_limit_entity  → SRNE charge limit (% SOC)
  #  srne_discharge_limit_entity → SRNE discharge limit (% SOC)
  # ────────────────────────────────────────────────────────────
  solar_entity:                "sensor.srne_pv_power"
  load2_entity:                "sensor.a_c_1f_power_meter_power"
  load3_entity:                "sensor.a_c_3f_power_meter_power"
  load1_entity:                "sensor.ef_r30241_ac_input_power"
  battery_entity:              "sensor.battery_soc_mean"
  home_entity:                 "sensor.srne_load_l1_apparent_power"
  battery_power_entity:        "sensor.total_battery_power"
  batt_current_entity:         "sensor.total_battery_current"
  srne_charge_limit_entity:    "number.srne_batttery_charge_limit"    # note: 'batttery' typo is in the HA entity name
  srne_discharge_limit_entity: "number.srne_batttery_discharge_limit" # note: 'batttery' typo is in the HA entity name
  # ────────────────────────────────────────────────────────────
  #  SCREENSAVER — update ha_url if needed; timers are
  #  configured directly on the ESPHome device card in HA
  # ────────────────────────────────────────────────────────────
  ha_url: "http://192.168.8.60:8123"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  on_boot:
    priority: -10
    then:
      - light.turn_on:
          id: backlight
          brightness: !lambda 'return id(display_brightness).state / 100.0f;'
      - lambda: |-
          // Pre-allocate photo vectors to their max sizes in one shot at boot,
          // before heap gets fragmented. Prevents repeated realloc (1→2→4→...→N)
          // during the first screensaver activation that could fragment the heap
          // and make the later 24 KB JPEG decode fail to find contiguous space.
          // All icon glyph changes use lv_label_set_text_static() (flash pointers,
          // no heap alloc) to reduce ongoing fragmentation from animation cycling.
          id(g_photo_queue).reserve((int)id(ss_photo_count).state);
          id(g_photo_order).reserve((int)id(ss_cycle_size).state);
          id(g_lvgl_ready) = true;
          id(update_slot_display).execute();    // apply NVS-restored slot labels and cached sensor values
          id(update_batt_display).execute();    // apply NVS-restored battery slot state
          id(update_batt_icon_state).execute(); // set initial battery icon animation state (static at boot)
          id(update_solar_icon_state).execute(); // set initial solar icon state (static at boot)

esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

# ── Logging ───────────────────────────────────────────────────
logger:
  level: WARN

# ── Home Assistant API ────────────────────────────────────────
api:

# ── OTA ───────────────────────────────────────────────────────
ota:
  - platform: esphome

# ── WiFi ──────────────────────────────────────────────────────
wifi:
  networks:
    - ssid: !secret wifi_ssid       # primary AP
      password: !secret wifi_password
    - ssid: !secret wifi_ssid2      # secondary AP
      password: !secret wifi_password2
  power_save_mode: none   # disable WiFi power save — improves signal stability and reduces latency
  ap:
    ssid: "cyd-e713b0"
    password: "cyd-e713b0"
  reboot_timeout: 0s   # never auto-reboot on WiFi loss — device keeps displaying powerflow data offline

captive_portal:

# ── Globals ───────────────────────────────────────────────────
# Screensaver state:      g_screensaver / g_pf_secs / g_photo_secs / g_photo_idx / g_photo_order / g_photo_trans
#                         g_photo_queue / g_photo_queue_pos   ← persistent queue across activations
# Home Load Slot cycling: g_slot_idx / g_slot_secs / g_load1_val / g_load2_val / g_load3_val
# Battery Slot cycling:   g_batt_slot / g_batt_power_val / g_batt_soc_val / g_batt_current_val /
#                         g_srne_charge_limit_val / g_srne_discharge_limit_val
# Battery icon animation: g_batt_anim_state / g_batt_anim_step
# Solar icon animation:   g_solar_val / g_solar_anim_state / g_solar_anim_step
globals:
  # LVGL ready flag — false until on_boot (priority -10) fires after lvgl::setup()
  # Guards any LVGL call that may fire from on_value during component setup
  - id: g_lvgl_ready
    type: bool
    initial_value: 'false'
    restore_value: false
  # Screensaver
  - id: g_pf_secs      # powerflow countdown (seconds); overwritten by ss_powerflow_mins.on_value on boot via NVS restore
    type: int
    initial_value: '300'  # fallback only — NVS restore sets the real value before on_boot fires
  - id: g_photo_secs   # current photo countdown (seconds); reset by activate_screensaver and per-photo advance
    type: int
    initial_value: '5'
  - id: g_photo_idx    # position in g_photo_order (0-based)
    type: int
    initial_value: '0'
  - id: g_screensaver  # true when screensaver is active
    type: bool
    initial_value: 'false'
  - id: g_photo_trans  # per-photo reveal type: 0=Instant 1=Fade 2=SlideLeft 3=SlideRight 4=SlideUp 5=SlideDown
    type: int           # set before each download so on_download_finished uses the same roll
    restore_value: false
    initial_value: '0'
  - id: g_photo_order  # current activation's play list (slice of g_photo_queue)
    type: std::vector<int>
  - id: g_photo_queue      # full shuffled/sequential queue — persists across activations
    type: std::vector<int> # rebuilt only when exhausted or photo count changes
  - id: g_photo_queue_pos  # next index to consume from g_photo_queue
    type: int
    initial_value: '0'
  # Home Load Slot cycling
  - id: g_slot_idx       # active Home Load Slot: 0=Load 2, 1=Load 3, 2=Load 1
    type: int
    initial_value: '0'
  - id: g_slot_secs      # slot rotation countdown (seconds)
    type: int
    initial_value: '5'    # fallback only — slot_cycle_secs.on_value sets the real value on boot via NVS restore
  - id: g_load2_val    # cached ${load2_entity}
    type: float
    restore_value: false
    initial_value: '0'
  - id: g_load3_val    # cached ${load3_entity}
    type: float
    restore_value: false
    initial_value: '0'
  - id: g_load1_val    # cached ${load1_entity}
    type: float
    restore_value: false
    initial_value: '0'
  # Battery slot cycling: g_batt_slot / cached sensor values (shares g_slot_secs timer)
  - id: g_batt_slot    # 0 = Battery Power W, 1 = Estimated Charge/Discharge Time
    type: int
    initial_value: '0'
    restore_value: false
  - id: g_batt_power_val    # cached ${battery_power_entity}
    type: float
    restore_value: false
    initial_value: '0'
  - id: g_batt_soc_val      # cached ${battery_entity} (%)
    type: float
    restore_value: false
    initial_value: '50'
  - id: g_batt_current_val  # cached ${batt_current_entity} (A, + = charging, - = discharging)
    type: float
    restore_value: false
    initial_value: '0'
  - id: g_srne_charge_limit_val    # cached ${srne_charge_limit_entity} (%)
    type: float
    restore_value: false
    initial_value: '100'
  - id: g_srne_discharge_limit_val # cached ${srne_discharge_limit_entity} (%)
    type: float
    restore_value: false
    initial_value: '20'
  # Battery SOC icon animation (driven by 250ms interval)
  - id: g_batt_anim_state  # 0=static  1=charging(step up)  2=discharging(step down)  3=alert(flash)
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_batt_anim_step   # current glyph index in the cycling animation (0=battery_full … 6=battery_0_bar)
    type: int
    restore_value: false
    initial_value: '0'
  # Solar icon animation (driven by 250ms interval — sun ping-pong state 1, moon ping-pong state 2)
  - id: g_solar_val        # cached ${solar_entity} (W)
    type: float
    restore_value: false
    initial_value: '0'
  - id: g_solar_anim_state # 0=static(no-sun day)  1=glyph-cycle(producing)  2=glyph-cycle(night no-power)
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_solar_anim_step  # current glyph index: state 1 → 0–7 sun ping-pong; state 2 → 0–4 moon cycle
    type: int
    restore_value: false
    initial_value: '0'

script:
  # ── Home Load Slot Display ───────────────────────────────────
  # Called by: sensor on_value (when active slot matches), advance_slot,
  # deactivate_screensaver, and on_boot (priority -10).
  # Uses raw LVGL C API — id(widget) returns lv_obj_t* for regular widgets.
  - id: update_slot_display
    then:
      - lambda: |-
          if (!id(g_lvgl_ready)) return;  // skip if LVGL not yet initialized
          float v = (id(g_slot_idx) == 0) ? id(g_load2_val) :
                    (id(g_slot_idx) == 1) ? id(g_load3_val) : id(g_load1_val);
          lv_label_set_text(id(lbl_slot),
            id(g_slot_idx) == 0 ? id(load2_label).state.c_str() :
            id(g_slot_idx) == 1 ? id(load3_label).state.c_str() : id(load1_label).state.c_str());
          if (id(g_slot_idx) == 2) {
            lv_obj_add_flag(id(icon_slot), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(icon_load1), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_clear_flag(id(icon_slot), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(icon_load1), LV_OBJ_FLAG_HIDDEN);
          }
          lv_color_t clr = (v <= 0)   ? lv_color_hex(0xFFFF00) :  // 0 W = idle/no data → yellow
                           (v < 700)  ? lv_color_hex(0x00FF00) :
                           (v < 1000) ? lv_color_hex(0x0096FF) :
                           (v < 1200) ? lv_color_hex(0xFFFF00) : lv_color_hex(0xFFA500);
          lv_obj_set_style_text_color(id(icon_slot), clr, 0);
          lv_obj_set_style_text_color(id(icon_load1), clr, 0);
          lv_obj_set_style_text_color(id(val_slot), clr, 0);
          char buf[16];
          if      (v >= 1000) snprintf(buf, sizeof(buf), "%.2f", v / 1000.0f);
          else if (v >= 100)  snprintf(buf, sizeof(buf), "%.0f", v);
          else if (v >= 10)   snprintf(buf, sizeof(buf), "%.1f", v);
          else                snprintf(buf, sizeof(buf), "%.2f", v);
          lv_label_set_text(id(val_slot), buf);
          lv_label_set_text_static(id(val_slot_unit), v >= 1000 ? "kW" : "W");  // literals in flash — no heap copy

  # ── Home Load Slot Advance ───────────────────────────────────
  # Finds next visible slot (skips Load 2/3 if below threshold; Load 1 always shows).
  # Called every slot_cycle_secs from the 1s interval while powerflow is active.
  - id: advance_slot
    then:
      - lambda: |-
          int next = (id(g_slot_idx) + 1) % 3;
          for (int i = 0; i < 3; i++) {
            int c = (next + i) % 3;
            bool ok = (c == 2) ||
              (c == 0 && id(g_load2_val) > id(load2_threshold).state) ||
              (c == 1 && id(g_load3_val) > id(load3_threshold).state);
            if (ok) { id(g_slot_idx) = c; break; }
          }
          id(update_slot_display).execute();

  # ── Battery Power Slot Display ───────────────────────────────
  # Slot 0: Battery Power (W / kW). Slot 1: Estimated charge/discharge time.
  # Called by: ha_battery_power (slot 0) / ha_batt_current / ha_battery /
  #            ha_srne_charge_limit / ha_srne_discharge_limit (slot 1) on_value,
  #            advance_batt_slot, batt_time_enabled.on_turn_off,
  #            deactivate_screensaver, and on_boot (priority -10).
  # First line guards g_lvgl_ready — safe for all call paths (mirrors update_slot_display).
  # Slot 1 falls back inline to slot 0 if: not eligible, time not yet valid, or batt_time_enabled=OFF.
  # Publishes 6 HA sensors (throttled to once per 60s via _do_pub static locals):
  #   Slot 1 eligible  → actual hours + target wall-clock time as minutes-since-midnight
  #   Slot 0 / fallback → independently recomputes estimate; if eligible publishes real values,
  #                       otherwise publishes 0s + status text (Full/Charging/Not Charging etc.)
  #   batt_hours_to_full / batt_hours_to_empty (h, graphable)
  #   batt_full_at_min / batt_empty_at_min (minutes since midnight, graphable)
  #   batt_full_at_time / batt_empty_at_time (text: time string or status)
  - id: update_batt_display
    then:
      - lambda: |-
          if (!id(g_lvgl_ready)) return;  // skip if LVGL not yet initialized (mirrors update_slot_display guard)
          // Throttle HA sensor publishes to once per 60s; always publish on first call.
          static bool _first_pub = true;
          static uint32_t _last_pub_ms = 0;
          bool _do_pub = _first_pub || (millis() - _last_pub_ms >= 60000UL);
          if (_do_pub) { _first_pub = false; _last_pub_ms = millis(); }
          float v = id(g_batt_power_val);
          if (id(g_batt_slot) == 1) {
            // ── Slot 1: Estimated Charge/Discharge Time ────────
            float soc     = id(g_batt_soc_val);
            float current = id(g_batt_current_val);
            float cap     = id(battery_capacity_ah).state;
            float clim    = id(g_srne_charge_limit_val);
            float dlim    = id(g_srne_discharge_limit_val);
            float thr     = id(batt_time_threshold_hrs).state;
            bool charging    = current > 0.5f;
            bool discharging = current < -0.5f;
            float hours   = 0;
            bool is_charge = false;
            bool eligible  = false;
            if (charging && clim > soc) {
              hours     = ((clim - soc) / 100.0f * cap) / current;
              is_charge = true;
              eligible  = hours < thr;
            } else if (discharging && soc > dlim) {
              hours     = ((soc - dlim) / 100.0f * cap) / (-current);
              is_charge = false;
              eligible  = hours < thr;
            }
            if (eligible) {
              auto now = id(ha_time).now();
              if (now.is_valid()) {
                // Compute target PHT time from raw UTC epoch — bypasses TZ env var
                time_t pht = now.timestamp + (8 * 3600);
                struct tm pht_tm; gmtime_r(&pht, &pht_tm);
                int total_min = (int)(hours * 60.0f + 0.5f);
                int tgt_min   = pht_tm.tm_min + (total_min % 60);
                int carry     = tgt_min / 60;
                tgt_min      %= 60;
                int tgt_hr    = pht_tm.tm_hour + (total_min / 60) + carry;
                int days      = tgt_hr / 24;
                tgt_hr       %= 24;
                // Convert to 12h AM/PM, no leading zero
                const char* am_pm = (tgt_hr < 12) ? "AM" : "PM";
                int h12 = tgt_hr % 12;
                if (h12 == 0) h12 = 12;  // 0 → 12 (midnight/noon)
                // Color — CHARGE: close to done = green; DISCHARGE: close to empty = orange
                lv_color_t clr;
                if (is_charge) {
                  if      (hours < 2) clr = lv_color_hex(0x00FF00);  // < 2h → almost done
                  else if (hours < 4) clr = lv_color_hex(0x0096FF);
                  else if (hours < 6) clr = lv_color_hex(0xFFFF00);
                  else                clr = lv_color_hex(0xFFA500);  // ≥ 6h → long time
                } else {
                  if      (hours < 3) clr = lv_color_hex(0xFFA500);  // < 3h → almost empty
                  else if (hours < 6) clr = lv_color_hex(0xFFFF00);
                  else if (hours < 9) clr = lv_color_hex(0x0096FF);
                  else                clr = lv_color_hex(0x00FF00);  // ≥ 9h → plenty left
                }
                // Title: "Charges to N% at" / "Empty to N% at", extended with day qualifier when multi-day
                int limit_pct = (int)(is_charge ? clim : dlim);
                char action[28];
                snprintf(action, sizeof(action), is_charge ? "Charges to %d%% at" : "Empty to %d%% at", limit_pct);
                char tbuf[48];
                if      (days == 0) snprintf(tbuf, sizeof(tbuf), "%s", action);
                else if (days == 1) snprintf(tbuf, sizeof(tbuf), "%s - Next Day", action);
                else                snprintf(tbuf, sizeof(tbuf), "%s - Next %d Days", action, days);
                lv_label_set_text(id(lbl_batt_title), tbuf);
                // Value: "8:40 AM" — no leading zero, 12h clock
                char buf[12];
                snprintf(buf, sizeof(buf), "%d:%02d %s", h12, tgt_min, am_pm);
                if (id(batt_log_enabled).state)
                  ESP_LOGW("batt", "Battery %s at %s (%s, %.1fh, SOC %.0f%% → %.0f%%)",
                    is_charge ? "full" : "empty", buf, tbuf, hours,
                    id(g_batt_soc_val),
                    is_charge ? id(g_srne_charge_limit_val) : id(g_srne_discharge_limit_val));
                lv_label_set_text(id(val_battery_power), buf);
                lv_obj_set_style_text_color(id(val_battery_power), clr, 0);
                lv_label_set_text_static(id(val_battery_power_unit), "");  // literal — no heap copy
                // Publish HA sensors — slot 1: actual time estimate (throttled to 60s)
                if (_do_pub) {
                  int min_of_day = tgt_hr * 60 + tgt_min;  // tgt_hr already %24 (0-23)
                  id(batt_hours_to_full).publish_state(is_charge ? hours : 0.0f);
                  id(batt_hours_to_empty).publish_state(!is_charge ? hours : 0.0f);
                  id(batt_full_at_min).publish_state(is_charge ? (float)min_of_day : 0.0f);
                  id(batt_empty_at_min).publish_state(!is_charge ? (float)min_of_day : 0.0f);
                  id(batt_full_at_time).publish_state(is_charge ? std::string(buf) : std::string("Not Charging"));
                  id(batt_empty_at_time).publish_state(!is_charge ? std::string(buf) : std::string("Not Discharging"));
                }
                return;  // slot 1 rendered — done
              }
              // Time not yet valid — fall through to power display
              if (id(batt_log_enabled).state)
                ESP_LOGW("batt", "update_batt_display slot1: time not valid, showing Power W");
              id(g_batt_slot) = 0;
            } else {
              // Not eligible — fall through to power display
              if (id(batt_log_enabled).state)
                ESP_LOGW("batt", "update_batt_display slot1 fallback: cur=%.1fA SOC=%.0f%% clim=%.0f%% dlim=%.0f%% hours=%.1f thr=%.0fh",
                  current, soc, clim, dlim, hours, thr);
              id(g_batt_slot) = 0;
            }
          }
          // ── Slot 0 (or slot 1 fallback): Battery Power ─────────────
          lv_label_set_text_static(id(lbl_batt_title), "Battery Power");  // literal — no heap copy
          char buf[16];
          if      (v >= 1000 || v <= -1000) snprintf(buf, sizeof(buf), "%.2f", v / 1000.0f);
          else if (v >= 100  || v <= -100)  snprintf(buf, sizeof(buf), "%.0f", v);
          else if (v >= 10   || v <= -10)   snprintf(buf, sizeof(buf), "%.1f", v);
          else                              snprintf(buf, sizeof(buf), "%.2f", v);
          lv_label_set_text(id(val_battery_power), buf);
          lv_color_t clr;
          // Asymmetric: charging colored by magnitude; ANY discharge → orange
          if      (v >= 2500) clr = lv_color_hex(0x00FF00);  // fast charge
          else if (v >= 500)  clr = lv_color_hex(0x0096FF);  // moderate charge
          else if (v >= 0)    clr = lv_color_hex(0xFFFF00);  // slow / idle
          else                clr = lv_color_hex(0xFFA500);  // discharging (any rate)
          lv_obj_set_style_text_color(id(val_battery_power), clr, 0);
          lv_label_set_text_static(id(val_battery_power_unit), (v >= 1000 || v <= -1000) ? "kW" : "W");  // literals — no heap copy
          // Publish HA sensors — always compute estimate independently of the display slot.
          // Display shows "Battery Power" here (slot 0), but HA sensors always reflect the
          // current estimate so they don't oscillate with the 5s slot timer. Throttled to 60s.
          if (_do_pub) {
            float _soc  = id(g_batt_soc_val);
            float _cur  = id(g_batt_current_val);
            float _cap  = id(battery_capacity_ah).state;
            float _clim = id(g_srne_charge_limit_val);
            float _dlim = id(g_srne_discharge_limit_val);
            float _thr  = id(batt_time_threshold_hrs).state;
            bool _chg = (_cur > 0.5f && _clim > _soc);
            bool _dis = (_cur < -0.5f && _soc > _dlim);
            float _hours = 0.0f;
            bool _is_charge = false, _eligible = false;
            if (_chg) {
              _hours = ((_clim - _soc) / 100.0f * _cap) / _cur;
              _is_charge = true; _eligible = (_hours < _thr);
            } else if (_dis) {
              _hours = ((_soc - _dlim) / 100.0f * _cap) / (-_cur);
              _eligible = (_hours < _thr);
            }
            if (_eligible && id(batt_time_enabled).state) {
              auto _now = id(ha_time).now();
              if (_now.is_valid()) {
                time_t _pht = _now.timestamp + (8 * 3600);
                struct tm _tm; gmtime_r(&_pht, &_tm);
                int _total_min = (int)(_hours * 60.0f + 0.5f);
                int _tgt_min = _tm.tm_min + (_total_min % 60);
                int _carry = _tgt_min / 60; _tgt_min %= 60;
                int _tgt_hr = _tm.tm_hour + (_total_min / 60) + _carry; _tgt_hr %= 24;
                const char* _ap = (_tgt_hr < 12) ? "AM" : "PM";
                int _h12 = _tgt_hr % 12; if (_h12 == 0) _h12 = 12;
                int _mod = _tgt_hr * 60 + _tgt_min;
                char _tbuf[12]; snprintf(_tbuf, sizeof(_tbuf), "%d:%02d %s", _h12, _tgt_min, _ap);
                id(batt_hours_to_full).publish_state(_is_charge ? _hours : 0.0f);
                id(batt_hours_to_empty).publish_state(!_is_charge ? _hours : 0.0f);
                id(batt_full_at_min).publish_state(_is_charge ? (float)_mod : 0.0f);
                id(batt_empty_at_min).publish_state(!_is_charge ? (float)_mod : 0.0f);
                id(batt_full_at_time).publish_state(_is_charge ? std::string(_tbuf) : std::string("Not Charging"));
                id(batt_empty_at_time).publish_state(!_is_charge ? std::string(_tbuf) : std::string("Not Discharging"));
                return;
              }
            }
            // Not eligible, disabled, or time not valid → publish status only
            id(batt_hours_to_full).publish_state(0.0f);
            id(batt_hours_to_empty).publish_state(0.0f);
            id(batt_full_at_min).publish_state(0.0f);
            id(batt_empty_at_min).publish_state(0.0f);
            id(batt_full_at_time).publish_state(
              (_soc >= _clim) ? std::string("Full") :
              _chg ? std::string("Charging") : std::string("Not Charging"));
            id(batt_empty_at_time).publish_state(
              (_soc <= _dlim) ? std::string("At Limit") :
              _dis ? std::string("Discharging") : std::string("Not Discharging"));
          }

  # ── Battery Slot Advance ─────────────────────────────────────
  # Toggles g_batt_slot 0↔1. Before switching to slot 1, checks eligibility:
  # time estimate only shown when within batt_time_threshold_hrs of the limit.
  # Logs (when batt_log_enabled ON): "disabled" / "slot1→0" / full eligibility details.
  - id: advance_batt_slot
    then:
      - lambda: |-
          int next = 1 - id(g_batt_slot);  // toggle 0↔1
          float soc     = id(g_batt_soc_val);
          float current = id(g_batt_current_val);
          float cap     = id(battery_capacity_ah).state;
          float clim    = id(g_srne_charge_limit_val);
          float dlim    = id(g_srne_discharge_limit_val);
          float thr     = id(batt_time_threshold_hrs).state;
          float hours   = -1;
          bool eligible = false;
          // Eligibility check mirrors update_batt_display slot 1 — keep both in sync if logic changes
          if (next == 1) {
            // If toggle is OFF, never show time estimate
            if (!id(batt_time_enabled).state) {
              next = 0;
            } else if (current > 0.5f && clim > soc) {
              hours    = ((clim - soc) / 100.0f * cap) / current;
              eligible = hours < thr;
              if (!eligible) next = 0;
            } else if (current < -0.5f && soc > dlim) {
              hours    = ((soc - dlim) / 100.0f * cap) / (-current);
              eligible = hours < thr;
              if (!eligible) next = 0;
            } else {
              next = 0;  // neither charging nor discharging — stay at Power W
            }
          }
          if (id(batt_log_enabled).state) {
            if (!id(batt_time_enabled).state)
              ESP_LOGW("batt", "advance_batt_slot: disabled — staying at slot 0 (Power W)");
            else if (next == 0 && id(g_batt_slot) == 1)
              ESP_LOGW("batt", "advance_batt_slot: slot1→0 (back to Power W)");
            else
              ESP_LOGW("batt", "advance_batt_slot: cur=%.1fA SOC=%.0f%% clim=%.0f%% dlim=%.0f%% cap=%.0fAh thr=%.0fh → hours=%.1f eligible=%d next_slot=%d",
                current, soc, clim, dlim, cap, thr, hours, (int)eligible, next);
          }
          id(g_batt_slot) = next;
          id(update_batt_display).execute();

  # ── Solar Icon Animation State ──────────────────────────────
  # Sets g_solar_anim_state and updates icon_solar glyph/color/animation.
  # Called after any change to g_solar_val (ha_solar.on_value), from deactivate_screensaver,
  # on_boot -10, and from the 1s interval when solar = 0 (catches time-of-day transitions).
  #
  # States:
  #   0 static    — power = 0 + daytime  → wb_cloudy \ue42d, grey, no animation
  #   1 glyph-cycle — power > 0 (any time) → sun ping-pong (8 steps, Yellow 0xFFFF00):
  #                   ec0f→e3ac→e3a9→e3ab→e3aa→e3ab→e3a9→e3ac (solar_power→bright7→bright4→bright6→bright5→…)
  #   2 glyph-cycle — power = 0 + nighttime → moon cycle icon_solar_moon uf174/uf34f/uf31d/ue65f/ue3e4, blue, 2000ms/step
  #
  # Night = PHT hour >= 18 or < 6 (18:00–06:00 inclusive).
  # Time detection uses now.timestamp + (8*3600) + gmtime_r — same PHT method as clock.
  - id: update_solar_icon_state
    then:
      - lambda: |-
          if (!id(g_lvgl_ready)) return;

          // Determine night/day using PHT (UTC+8) — bypasses TZ env var
          bool is_night = false;
          int dbg_hour = -1;
          bool time_valid = false;
          auto now_t = id(ha_time).now();
          if (now_t.is_valid()) {
            time_valid = true;
            time_t pht = now_t.timestamp + (8 * 3600);
            struct tm t; gmtime_r(&pht, &t);
            dbg_hour = t.tm_hour;
            is_night = (t.tm_hour >= 18 || t.tm_hour < 6);
          }

          float solar_w = id(g_solar_val);
          int new_state = (solar_w > 0.0f) ? 1 :   // producing → glyph-cycle
                          is_night           ? 2 :   // night + no power → moon ping-pong
                                               0;    // day + no power  → static cloudy

          int prev_state = id(g_solar_anim_state);
          id(g_solar_anim_state) = new_state;
          if (new_state != prev_state)
            id(g_solar_anim_step) = 0;  // reset step only on state change (not on repeated same-state calls)

          if (id(solar_log_enabled).state)
            ESP_LOGW("solar", "solar_icon: solar=%.0fW time_valid=%d PHT_hr=%d is_night=%d prev=%d → new=%d screensaver=%d",
              solar_w, (int)time_valid, dbg_hour, (int)is_night, prev_state, new_state, (int)id(g_screensaver));

          // Skip LVGL ops when screensaver is active (icon not visible)
          if (id(g_screensaver)) return;

          // Always sync widget visibility to current state on every call —
          // using FLAG_HIDDEN (not opacity) so the hidden widget never renders.
          // This prevents the ghost icon when update_solar_icon_state is called
          // repeatedly in the same state (e.g. from the 1s interval when solar=0).
          if (new_state == 2) {
            lv_obj_add_flag(id(icon_solar), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(icon_solar_moon), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_clear_flag(id(icon_solar), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(icon_solar_moon), LV_OBJ_FLAG_HIDDEN);
          }

          // Apply glyph/color only on state change, or re-apply static cloudy on every call
          // (states 1 & 2 let the interval own the glyph — repeated same-state calls must
          //  not interrupt the ping-pong mid-cycle)
          if (new_state != prev_state || new_state == 0) {
            if (new_state == 0) {
              // Daytime no production: wb_cloudy, grey, static
              lv_label_set_text_static(id(icon_solar), "\ue42d");
              lv_obj_set_style_text_color(id(icon_solar), lv_color_hex(0x888888), 0);
            } else if (new_state == 1) {
              // Solar producing: show solar_power (step 0); interval ping-pongs through rest
              lv_label_set_text_static(id(icon_solar), "\uec0f");
              lv_obj_set_style_text_color(id(icon_solar), lv_color_hex(0xFFFF00), 0);
            } else {
              // Night no production: show nights_stay (step 0); interval cycles through rest
              lv_label_set_text_static(id(icon_solar_moon), "\uf174");
              lv_obj_set_style_text_color(id(icon_solar_moon), lv_color_hex(0x0096FF), 0);
            }
          }

  # ── Battery SOC Icon Animation State ────────────────────────
  # Determines which animation should run on icon_battery based on current cached
  # values. Called after any change to g_batt_soc_val or g_batt_current_val.
  #
  # Priority:  SOC < 10%        → state 3 alert    (flash battery_alert glyph)
  #            current < −0.5A  → state 2 discharge (step down toward battery_0_bar)
  #            current > +0.5A  → state 1 charge    (step up toward battery_full)
  #            else             → state 0 static    (icon managed by ha_battery)
  #
  # Always resets g_batt_anim_step to the current SOC glyph index so cycling
  # starts from the real battery level. When going static, restores the correct
  # glyph+color immediately (ha_battery.on_value only fires on SOC change).
  - id: update_batt_icon_state
    then:
      - lambda: |-
          if (!id(g_lvgl_ready)) return;
          float soc = id(g_batt_soc_val);
          float cur = id(g_batt_current_val);

          // Determine new animation state (alert has highest priority)
          int new_state;
          if      (soc < 10.0f) new_state = 3;  // alert: SOC critical (<10%)
          else if (cur < -0.5f)  new_state = 2;  // discharging
          else if (cur >  0.5f)  new_state = 1;  // charging
          else                   new_state = 0;  // static/idle

          // Map SOC% to glyph index: 0=battery_full … 6=battery_0_bar
          // (alert glyph index 7 is handled by state 3; not used as a step value)
          int start = (soc >= 98) ? 0 : (soc >= 85) ? 1 : (soc >= 70) ? 2 :
                      (soc >= 55) ? 3 : (soc >= 40) ? 4 : (soc >= 25) ? 5 : 6;

          // Reset step to current real SOC level so animation begins from correct position
          id(g_batt_anim_step)  = start;
          id(g_batt_anim_state) = new_state;

          // When going static (e.g. current drops to idle), restore the icon immediately.
          // ha_battery.on_value won't fire again until SOC changes, so we set it here.
          // Skip LVGL ops when screensaver is active (icon not visible).
          if (new_state == 0 && !id(g_screensaver)) {
            static const char* const GLYPHS[] = {
              "\ue1a4", "\uebd4", "\uebe2", "\uebdd",
              "\uebe0", "\uebd9", "\uebdc", "\ue19c"
            };
            static const uint32_t COLORS[] = {
              0x00FF00, 0x00FF00, 0x0096FF, 0x0096FF,
              0xFFFF00, 0xFFFF00, 0xFFA500, 0xFFA500  // idx4=2bar idx5=1bar Yellow; idx6=0bar idx7=alert Orange
            };
            int idx = start;  // new_state==0 guarantees soc >= 10% (alert state 3 catches soc < 10%)
            lv_obj_set_style_opa(id(icon_battery), LV_OPA_COVER, 0);
            lv_label_set_text_static(id(icon_battery), GLYPHS[idx]);
            lv_obj_set_style_text_color(id(icon_battery), lv_color_hex(COLORS[idx]), 0);
          }

  # ── Screensaver Activate ─────────────────────────────────────
  # Builds play order (Fisher-Yates shuffle or sequential), hides the image widget
  # to avoid RGB565A8 draw-strip OOM during the page transition, then transitions.
  - id: activate_screensaver
    then:
      - lambda: |-
          id(g_screensaver) = true;
          id(g_photo_secs) = (int)id(ss_photo_secs).state;
          // Persistent-shuffle queue: each activation takes the next cycle_size slice.
          // Queue is rebuilt (and re-shuffled for Random) only when exhausted or photo count changes.
          int count     = (int)id(ss_photo_count).state;
          int cycle_size = (int)id(ss_cycle_size).state;
          bool is_random = (id(ss_photo_order).current_option() == "Random");
          if ((int)id(g_photo_queue).size() != count ||
              id(g_photo_queue_pos) >= (int)id(g_photo_queue).size()) {
            id(g_photo_queue).clear();
            for (int i = 1; i <= count; i++) id(g_photo_queue).push_back(i);
            if (is_random) {
              for (int i = count - 1; i > 0; i--) {
                int j = esp_random() % (i + 1);
                std::swap(id(g_photo_queue)[i], id(g_photo_queue)[j]);
              }
            }
            id(g_photo_queue_pos) = 0;
          }
          // Take next cycle_size photos from the persistent queue
          int end = std::min(id(g_photo_queue_pos) + cycle_size, (int)id(g_photo_queue).size());
          id(g_photo_order).clear();
          for (int i = id(g_photo_queue_pos); i < end; i++)
            id(g_photo_order).push_back(id(g_photo_queue)[i]);
          id(g_photo_queue_pos) = end;
          id(g_photo_idx) = 0;
          int photo_num = id(g_photo_order)[0];
          auto t = id(ss_transition).current_option();
          // Hide before page transition — LVGL skips hidden widgets, avoiding the 3.6 KB
          // RGB565A8 draw-strip OOM on fragmented heap. TRANSP also primes opacity so
          // per-photo Fade reveals start from invisible (on_download_finished shows/animates).
          lv_obj_add_flag(id(ss_img_widget), LV_OBJ_FLAG_HIDDEN);
          lv_obj_set_style_opa(id(ss_img_widget), LV_OPA_TRANSP, 0);
          if      (t == "Fade")        id(g_photo_trans) = 1;
          else if (t == "Slide Left")  id(g_photo_trans) = 2;
          else if (t == "Slide Right") id(g_photo_trans) = 3;
          else if (t == "Slide Up")    id(g_photo_trans) = 4;
          else if (t == "Slide Down")  id(g_photo_trans) = 5;
          else if (t == "Random")      id(g_photo_trans) = (int)(esp_random() % 6);
          else                         id(g_photo_trans) = 0;  // None
          // Append a random query string so online_image always sees a new URL and
          // fires on_download_finished — even when the same photo is selected twice
          // in a row (e.g. Photo Count=1 or small cycles). HA ignores the parameter.
          char url[92];
          snprintf(url, sizeof(url),
            "${ha_url}/local/screensaver/%02d.jpg?r=%08X", photo_num, esp_random());
          id(ss_img).release();  // free old decoded image buffer BEFORE downloading next — prevents double-buffer OOM
          id(ss_img).set_url(url);
          id(ss_img).update();
          lv_scr_load_anim_t anim = LV_SCR_LOAD_ANIM_NONE;
          const char* anim_name = "None";
          if (t == "Random") {
            switch (esp_random() % 5) {
              case 0: anim = LV_SCR_LOAD_ANIM_FADE_IN;      anim_name = "Fade";        break;
              case 1: anim = LV_SCR_LOAD_ANIM_MOVE_LEFT;    anim_name = "Slide Left";  break;
              case 2: anim = LV_SCR_LOAD_ANIM_MOVE_RIGHT;   anim_name = "Slide Right"; break;
              case 3: anim = LV_SCR_LOAD_ANIM_MOVE_TOP;     anim_name = "Slide Up";    break;
              case 4: anim = LV_SCR_LOAD_ANIM_MOVE_BOTTOM;  anim_name = "Slide Down";  break;
            }
          } else if (t == "Fade")       { anim = LV_SCR_LOAD_ANIM_FADE_IN;     anim_name = "Fade"; }
          else if (t == "Slide Left")   { anim = LV_SCR_LOAD_ANIM_MOVE_LEFT;   anim_name = "Slide Left"; }
          else if (t == "Slide Right")  { anim = LV_SCR_LOAD_ANIM_MOVE_RIGHT;  anim_name = "Slide Right"; }
          else if (t == "Slide Up")     { anim = LV_SCR_LOAD_ANIM_MOVE_TOP;    anim_name = "Slide Up"; }
          else if (t == "Slide Down")   { anim = LV_SCR_LOAD_ANIM_MOVE_BOTTOM; anim_name = "Slide Down"; }
          static const char* ptnames[] = {"Instant","Fade","Slide Left","Slide Right","Slide Up","Slide Down"};
          ESP_LOGW("ss", "Screensaver — photo %d [page:%s | photo:%s] fetching %s",
            photo_num, anim_name, ptnames[id(g_photo_trans)], url);
          lv_scr_load_anim(id(screensaver_page)->obj, anim, (int)id(ss_anim_ms).state, 0, false);

  # ── Screensaver Deactivate ───────────────────────────────────
  # Hides image, resets state, refreshes powerflow display, then transitions back.
  - id: deactivate_screensaver
    then:
      - lambda: |-
          id(g_screensaver) = false;
          id(g_pf_secs) = (int)(id(ss_powerflow_mins).state * 60.0f);
          lv_anim_del(id(ss_img_widget), NULL);  // cancel any running animation (fade or slide)
          lv_obj_set_x(id(ss_img_widget), 0);   // reset position in case a slide was interrupted
          lv_obj_set_y(id(ss_img_widget), 0);
          lv_obj_add_flag(id(ss_img_widget), LV_OBJ_FLAG_HIDDEN);  // hide during return transition
          auto t = id(ss_transition).current_option();
          lv_scr_load_anim_t anim = LV_SCR_LOAD_ANIM_NONE;
          const char* anim_name = "None";
          if (t == "Random") {
            switch (esp_random() % 5) {
              case 0: anim = LV_SCR_LOAD_ANIM_FADE_IN;      anim_name = "Fade";        break;
              case 1: anim = LV_SCR_LOAD_ANIM_MOVE_RIGHT;   anim_name = "Slide Right"; break;
              case 2: anim = LV_SCR_LOAD_ANIM_MOVE_LEFT;    anim_name = "Slide Left";  break;
              case 3: anim = LV_SCR_LOAD_ANIM_MOVE_BOTTOM;  anim_name = "Slide Down";  break;
              case 4: anim = LV_SCR_LOAD_ANIM_MOVE_TOP;     anim_name = "Slide Up";    break;
            }
          } else if (t == "Fade")       { anim = LV_SCR_LOAD_ANIM_FADE_IN;     anim_name = "Fade"; }
          else if (t == "Slide Left")   { anim = LV_SCR_LOAD_ANIM_MOVE_RIGHT;  anim_name = "Slide Left"; }
          else if (t == "Slide Right")  { anim = LV_SCR_LOAD_ANIM_MOVE_LEFT;   anim_name = "Slide Right"; }
          else if (t == "Slide Up")     { anim = LV_SCR_LOAD_ANIM_MOVE_BOTTOM; anim_name = "Slide Up"; }
          else if (t == "Slide Down")   { anim = LV_SCR_LOAD_ANIM_MOVE_TOP;    anim_name = "Slide Down"; }
          ESP_LOGW("ss", "→ Power Flow [%s] (next screensaver in %ds)",
            anim_name, id(g_pf_secs));  // anim_name = transition setting name; actual return direction is reversed
          id(update_slot_display).execute();     // refresh Home Load Slots tile before page animates in
          id(update_batt_display).execute();     // refresh Battery Power / Time tile
          id(update_batt_icon_state).execute();  // restore correct battery icon animation
          id(update_solar_icon_state).execute(); // restore correct solar icon animation (power/time may have changed)
          lv_scr_load_anim(id(main_page)->obj, anim, (int)id(ss_anim_ms).state, 0, false);

# ── Buttons ───────────────────────────────────────────────────
button:
  - platform: safe_mode
    id: button_safe_mode
    name: Safe Mode Boot
    entity_category: config

  - platform: factory_reset
    id: factory_reset_btn
    name: Factory Reset
    entity_category: config

# ── Fonts ─────────────────────────────────────────────────────
font:
  - file: "gfonts://Roboto"
    id: header_font
    size: 40
    glyphs: "0123456789: AMP-"  # digits + ':' ' ' for time; A M P for AM/PM; '-' for fallback "--:--:-- --"
  - file: "gfonts://Roboto"
    id: value_font
    size: 50
    glyphs: "0123456789.: -AMP"  # digits, dot for W/kW values; ':' and space for time "H:MM AM"; '-' for negative power; 'AMP' for AM/PM
  - file: "gfonts://Roboto"
    id: label_font
    size: 12
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz .%/+-"
  - file: "gfonts://Material Icons"
    id: icon_font
    size: 60
    glyphs: [
      "\uec0f", # solar_power — base solar icon (used when power > 0 at start of glyph cycle)
      "\ueb3b", # ac_unit (snowflake) — slot icon for A/C loads
      "\ue88a", # home — home load icon
      "\ue63c", # electrical_services — Load 1 icon
      # ── Solar animation glyphs — sun ping-pong (state 1) ──────
      "\ue3a9", # brightness_4 — sun with some rays (sun ping-pong step 2/6)
      "\ue3aa", # brightness_5 — sun          (sun ping-pong step 4)
      "\ue3ab", # brightness_6 — sun          (sun ping-pong step 3/5)
      "\ue3ac", # brightness_7 — sun, most rays (sun ping-pong step 1/7)
      "\ue42d", # wb_cloudy    — daytime, no solar production (state 0)
    ]
  # Moon animation font — Material Symbols Outlined required for moon_stars/star_shine
  - file: "gfonts://Material Symbols Outlined"
    id: icon_font_moon
    size: 60
    glyphs: [
      "\uf174", # nights_stay  — crescent moon + stars (moon cycle step 0)
      "\uf34f", # moon_stars   — moon with stars       (moon cycle step 1)
      "\uf31d", # star_shine   — shining star           (moon cycle step 2)
      "\ue65f", # auto_awesome — sparkles ✨            (moon cycle step 3)
      "\ue3e4", # flare        — starburst              (moon cycle step 4)
    ]
  - file: "gfonts://Material Icons"
    id: icon_font_batt
    size: 90
    glyphs: [
      "\ue1a4",  # battery_full
      "\uebd4",  # battery_5_bar
      "\uebe2",  # battery_4_bar
      "\uebdd",  # battery_3_bar
      "\uebe0",  # battery_2_bar
      "\uebd9",  # battery_1_bar
      "\uebdc",  # battery_0_bar
      "\ue19c",  # battery_alert
    ]

# ── Time ──────────────────────────────────────────────────────
# ha_time.now().hour reflects the TZ env var, which HA's native API may set to
# UTC regardless of HA timezone config. To guarantee PHT at all times we use
# now.timestamp (raw UTC epoch) + fixed 8h offset with gmtime_r — this bypasses
# TZ entirely and is immune to both "UTC at boot" and "+16 after sync" issues.
time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - seconds: /1
        then:
          - lvgl.label.update:
              id: lbl_time
              text: !lambda |-
                auto now = id(ha_time).now();
                if (!now.is_valid()) return std::string("--:--:-- --");
                // Compute PHT (UTC+8) directly from raw epoch — bypasses TZ env var
                time_t pht = now.timestamp + (8 * 3600);
                struct tm t; gmtime_r(&pht, &t);
                int h = t.tm_hour;
                const char* ampm = (h >= 12) ? "PM" : "AM";
                if (h == 0) h = 12;
                else if (h > 12) h -= 12;
                return str_sprintf("%d:%02d:%02d %s", h, t.tm_min, t.tm_sec, ampm);

# ── Debug (heap monitoring) ──────────────────────────────────
# Exposes SRAM heap metrics as HA sensors for real-time monitoring.
# Zero heap impact: measurement calls only read FreeRTOS internal metadata.
# ~450 bytes permanent SRAM cost for the 3 sensor objects — negligible.
debug:
  update_interval: 5s

# ── Sensors ──────────────────────────────────────────────────
sensor:
  # ── Heap Monitoring ───────────────────────────────────────
  # Key metric: Largest Free Block must stay ≥ 24576 bytes for JPEG decode.
  # Graph sensor.cyd_heap_largest_block in HA to confirm OOM mitigation is working.
  - platform: debug
    free:
      name: "Heap Free"
      id: heap_free
      entity_category: diagnostic
    block:
      name: "Heap Largest Block"
      id: heap_largest_block
      entity_category: diagnostic
    loop_time:
      name: "Loop Time"
      id: heap_loop_time
      entity_category: diagnostic

  # ── WiFi Signal ───────────────────────────────────────────
  - platform: wifi_signal
    name: Signal strength
    update_interval: 300s
    accuracy_decimals: 0

  # ── Solar ────────────────────────────────────────────────
  # Caches value into g_solar_val; delegates icon animation to update_solar_icon_state (always).
  # LVGL display updates (val_solar / val_solar_unit) skipped during screensaver —
  # these widgets are on main_page (not visible). Values self-correct on screensaver exit
  # when the next sensor update fires (~5s). Eliminates heap alloc/free churn during screensaver.
  - platform: homeassistant
    id: ha_solar
    entity_id: ${solar_entity}
    on_value:
      then:
        - lambda: |-
            id(g_solar_val) = x;                        // always cache — used by update_solar_icon_state
            id(update_solar_icon_state).execute();       // always run — has internal screensaver guard for LVGL ops
        - if:
            condition:
              lambda: 'return !id(g_screensaver);'
            then:
              - lvgl.label.update:
                  id: val_solar
                  text: !lambda |-
                    if (x >= 1000) return str_sprintf("%.2f", x / 1000.0f);
                    if (x >= 100) return str_sprintf("%.0f", x);
                    if (x >= 10) return str_sprintf("%.1f", x);
                    return str_sprintf("%.2f", x);
                  text_color: !lambda |-
                    if (x > 3600) return lv_color_hex(0x00FF00);
                    if (x > 2000) return lv_color_hex(0x0096FF);
                    if (x > 900)  return lv_color_hex(0xFFFF00);
                    return lv_color_hex(0xFFA500);
              - lvgl.label.update:
                  id: val_solar_unit
                  text: !lambda 'return (x >= 1000) ? std::string("kW") : std::string("W");'

  # ── Home Load Slots (3 slots: Load 2 → Load 3 → Load 1) ──
  # All three cache their value; update the display only when their slot is active.
  - platform: homeassistant
    id: ha_load2
    entity_id: ${load2_entity}
    on_value:
      then:
        - lambda: |-
            id(g_load2_val) = x;
            if (!id(g_screensaver) && id(g_slot_idx) == 0)
              id(update_slot_display).execute();

  - platform: homeassistant
    id: ha_load3
    entity_id: ${load3_entity}
    on_value:
      then:
        - lambda: |-
            id(g_load3_val) = x;
            if (!id(g_screensaver) && id(g_slot_idx) == 1)
              id(update_slot_display).execute();

  - platform: homeassistant
    id: ha_load1
    entity_id: ${load1_entity}
    on_value:
      then:
        - lambda: |-
            id(g_load1_val) = x;
            if (!id(g_screensaver) && id(g_slot_idx) == 2)
              id(update_slot_display).execute();

  # ── Home Load (apparent power — VA/kVA) ─────────────────────
  # LVGL updates skipped during screensaver — widget on main_page (not visible).
  # Self-corrects within ~5s of screensaver exit on next sensor update.
  - platform: homeassistant
    id: ha_home
    entity_id: ${home_entity}
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(g_screensaver);'
            then:
              - lvgl.label.update:
                  id: val_home
                  text: !lambda |-
                    if (x >= 1000) return str_sprintf("%.2f", x / 1000.0f);
                    if (x >= 100) return str_sprintf("%.0f", x);
                    if (x >= 10) return str_sprintf("%.1f", x);
                    return str_sprintf("%.2f", x);
                  text_color: !lambda |-
                    if (x < 1000) return lv_color_hex(0x00FF00);
                    if (x < 2000) return lv_color_hex(0x0096FF);
                    if (x < 3000) return lv_color_hex(0xFFFF00);
                    return lv_color_hex(0xFFA500);
              - lvgl.label.update:
                  id: icon_home
                  text_color: !lambda |-
                    if (x < 1000) return lv_color_hex(0x00FF00);
                    if (x < 2000) return lv_color_hex(0x0096FF);
                    if (x < 3000) return lv_color_hex(0xFFFF00);
                    return lv_color_hex(0xFFA500);
              - lvgl.label.update:
                  id: val_home_unit
                  text: !lambda 'return (x >= 1000) ? std::string("kVA") : std::string("VA");'

  # ── Battery SOC ───────────────────────────────────────────
  # Always caches g_batt_soc_val and calls update_batt_icon_state (has internal screensaver guard).
  # LVGL display updates (icon_battery glyph, val_battery text) skipped during screensaver —
  # widgets on main_page (not visible). Self-correct on next sensor update after screensaver exit.
  - platform: homeassistant
    id: ha_battery
    entity_id: ${battery_entity}
    on_value:
      then:
        - lambda: |-
            id(g_batt_soc_val) = x;  // always cache — used by time estimate + icon state
            if (!id(g_screensaver) && id(g_batt_slot) == 1)
              id(update_batt_display).execute();
        - if:
            condition:
              lambda: 'return !id(g_screensaver);'
            then:
              - lvgl.label.update:
                  id: icon_battery
                  text: !lambda |-
                    if (x >= 98) return "\ue1a4";
                    if (x >= 85) return "\uebd4";
                    if (x >= 70) return "\uebe2";
                    if (x >= 55) return "\uebdd";
                    if (x >= 40) return "\uebe0";
                    if (x >= 25) return "\uebd9";
                    if (x >= 10) return "\uebdc";  // ≥10% = 0_bar; <10% = alert
                    return "\ue19c";
                  text_color: !lambda |-
                    if (x >= 80) return lv_color_hex(0x00FF00);
                    if (x >= 50) return lv_color_hex(0x0096FF);
                    if (x >= 25) return lv_color_hex(0xFFFF00);  // ≥25% Yellow — matches battery_1_bar glyph
                    return lv_color_hex(0xFFA500);
              - lvgl.label.update:
                  id: val_battery
                  text: !lambda |-
                    if (x >= 100) return str_sprintf("%.0f", x);
                    if (x >= 10) return str_sprintf("%.1f", x);
                    return str_sprintf("%.2f", x);
                  text_color: !lambda |-
                    if (x >= 80) return lv_color_hex(0x00FF00);
                    if (x >= 50) return lv_color_hex(0x0096FF);
                    if (x >= 25) return lv_color_hex(0xFFFF00);  // ≥25% Yellow — matches battery_1_bar glyph
                    return lv_color_hex(0xFFA500);
        - lambda: id(update_batt_icon_state).execute();  // always run — re-evaluate animation state (has internal screensaver guard)

  # ── Battery Power ─────────────────────────────────────────
  # Caches value; delegates LVGL update to update_batt_display (respects active slot).
  - platform: homeassistant
    id: ha_battery_power
    entity_id: ${battery_power_entity}
    on_value:
      then:
        - lambda: |-
            id(g_batt_power_val) = x;
            if (!id(g_screensaver) && id(g_batt_slot) == 0)
              id(update_batt_display).execute();

  # ── Battery Current ────────────────────────────────────────
  # Positive = charging, negative = discharging.
  - platform: homeassistant
    id: ha_batt_current
    entity_id: ${batt_current_entity}
    on_value:
      then:
        - lambda: |-
            id(g_batt_current_val) = x;
            if (!id(g_screensaver) && id(g_batt_slot) == 1)
              id(update_batt_display).execute();  // refresh time estimate
            id(update_batt_icon_state).execute();  // current direction changed — re-evaluate icon animation

  # ── SRNE Charge Limit ──────────────────────────────────────
  # Caches charge limit %; refreshes slot 1 time estimate when active (clim used to compute hours to full).
  - platform: homeassistant
    id: ha_srne_charge_limit
    entity_id: ${srne_charge_limit_entity}
    on_value:
      then:
        - lambda: |-
            id(g_srne_charge_limit_val) = x;
            if (!id(g_screensaver) && id(g_batt_slot) == 1)
              id(update_batt_display).execute();

  # ── SRNE Discharge Limit ───────────────────────────────────
  # Caches discharge limit %; refreshes slot 1 time estimate when active (dlim used to compute hours to empty).
  - platform: homeassistant
    id: ha_srne_discharge_limit
    entity_id: ${srne_discharge_limit_entity}
    on_value:
      then:
        - lambda: |-
            id(g_srne_discharge_limit_val) = x;
            if (!id(g_screensaver) && id(g_batt_slot) == 1)
              id(update_batt_display).execute();

  # ── Battery Time Estimate — HA Sensors (graphable) ────────────
  # Published by update_batt_display (throttled to 60s). Both exit paths publish:
  #   Slot 1 eligible  → actual hours / minutes-since-midnight values.
  #   Slot 0 / fallback → independently recomputes estimate; publishes real values
  #                       if still eligible, otherwise 0.0 for numeric sensors.
  # Use these in HA history graphs; pair with the text_sensor entities for
  # human-readable time strings on dashboard cards.
  - platform: template
    name: "Battery Hours to Full"
    id: batt_hours_to_full
    unit_of_measurement: "h"
    accuracy_decimals: 1
    state_class: measurement
    update_interval: never

  - platform: template
    name: "Battery Hours to Empty"
    id: batt_hours_to_empty
    unit_of_measurement: "h"
    accuracy_decimals: 1
    state_class: measurement
    update_interval: never

  - platform: template
    name: "Battery Full At"
    id: batt_full_at_min
    unit_of_measurement: "min"
    accuracy_decimals: 0
    state_class: measurement
    update_interval: never
    # Value = minutes since midnight (0–1440). e.g. 10:45 AM = 645, 6:30 PM = 1110.
    # 0 when not charging or estimate unavailable.

  - platform: template
    name: "Battery Empty At"
    id: batt_empty_at_min
    unit_of_measurement: "min"
    accuracy_decimals: 0
    state_class: measurement
    update_interval: never
    # Value = minutes since midnight (0–1440). 0 when not discharging or estimate unavailable.

# ── Hardware ──────────────────────────────────────────────────
# Display SPI (tft): GPIO14(CLK) / GPIO13(MOSI) / GPIO12(MISO) / GPIO15(CS) / GPIO2(DC)
# Touch SPI (XPT2046): GPIO25(CLK) / GPIO32(MOSI) / GPIO39(MISO) / GPIO33(CS) / GPIO36(IRQ)
#   ↑ wired on the PCB but touchscreen: is not yet configured.
#   To enable: add a second spi: block for the touch bus + a touchscreen: component.
spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0.5s

display:
  - platform: mipi_spi
    model: ILI9341
    id: lcd_display
    spi_id: tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    auto_clear_enabled: false
    update_interval: never
    invert_colors: false
    color_order: BGR
    dimensions:
      width: 240
      height: 320

# ── HTTP (required by online_image) ──────────────────────────
http_request:
  useragent: esphome/${name}
  timeout: 10s

# ── Screensaver Image ─────────────────────────────────────────
# transparency: chroma_key enables LV_DRAW_SW_SUPPORT_RGB565A8 in lv_conf.h,
# which is required for the SW renderer to scale RGB565 images (scale: 2.5).
# Initial URL is 00.jpg (non-existent). All real photo URLs include a random
# ?r=XXXXXXXX query string so online_image always sees a new URL and fires
# on_download_finished — even when the same photo is selected twice in a row.
# HA ignores the query parameter and serves the same static file.
#
# Photo size: pre-resize to 128×96 pixels before uploading.
#   128×96 RGB565 = 24,576 bytes decoded. Confirmed heap minimum after all OOM
#   mitigations = ~45,000 bytes → ~20,400 bytes headroom (75-min soak test).
#   OOM mitigations in place:
#   (1) on_boot reserve() pre-allocates vectors before heap fragments.
#   (2) All icon glyph changes use lv_label_set_text_static() — no heap alloc.
#   (3) ss_img_widget hidden before lv_scr_load_anim() — avoids 3.6 KB draw-strip.
#   (4) ha_solar/ha_home/ha_battery LVGL updates guarded during screensaver.
#   (5) ss_img.release() called before every set_url() — frees old decoded image
#       buffer BEFORE new download starts, preventing double-buffer overlap OOM.
#       (heap sensor 5s poll misses the brief overlap window — graph looks fine
#        but actual dip can cause OOM in the sub-second decode window)
#
#   Resolution comparison (320×240 display):
#     160×120 @ scale:2.0 = 38,400 bytes → ~6,600 headroom  ⚠️ thin margin, not recommended
#     128×96  @ scale:2.5 = 24,576 bytes → ~20,400 headroom ✅ SAFE (current, recommended)
#     80×60   @ scale:4.0 =  9,600 bytes                    ✅ ultra-safe fallback
#   Upload to HA: config/www/screensaver/01.jpg … NN.jpg
online_image:
  - id: ss_img
    url: "${ha_url}/local/screensaver/00.jpg"
    format: JPEG
    type: RGB565
    transparency: chroma_key
    update_interval: never
    on_download_finished:
      then:
        - if:
            condition:
              lambda: 'return id(g_screensaver);'
            then:
              - lvgl.image.update:
                  id: ss_img_widget
                  src: ss_img
              - lambda: |-
                 // Cancel any running animation FIRST, then set correct initial state per transition
                 lv_anim_del(id(ss_img_widget), NULL);
                 int trans = id(g_photo_trans);
                 if (trans == 1) {
                   // Fade: opa already TRANSP (set in interval) — reset position then reveal and animate
                   lv_obj_set_x(id(ss_img_widget), 0);
                   lv_obj_set_y(id(ss_img_widget), 0);
                   lv_obj_clear_flag(id(ss_img_widget), LV_OBJ_FLAG_HIDDEN);
                   lv_anim_t a;
                   lv_anim_init(&a);
                   lv_anim_set_var(&a, id(ss_img_widget));
                   lv_anim_set_exec_cb(&a, [](void* obj, int32_t v) {
                     lv_obj_set_style_opa((lv_obj_t*)obj, v, 0);
                   });
                   lv_anim_set_values(&a, LV_OPA_TRANSP, LV_OPA_COVER);
                   lv_anim_set_duration(&a, (int)(id(ss_anim_ms).state * 2.0f));
                   lv_anim_start(&a);
                 } else if (trans >= 2) {
                   // Slide: set off-screen opaque position, reveal, then animate to center
                   // 2=SlideLeft(from right), 3=SlideRight(from left), 4=SlideUp(from bottom), 5=SlideDown(from top)
                   lv_obj_set_style_opa(id(ss_img_widget), LV_OPA_COVER, 0);
                   int32_t sx = (trans == 2) ?  320 : (trans == 3) ? -320 : 0;
                   int32_t sy = (trans == 4) ?  240 : (trans == 5) ? -240 : 0;
                   lv_obj_set_x(id(ss_img_widget), sx);
                   lv_obj_set_y(id(ss_img_widget), sy);
                   lv_obj_clear_flag(id(ss_img_widget), LV_OBJ_FLAG_HIDDEN);
                   lv_anim_t a;
                   lv_anim_init(&a);
                   lv_anim_set_var(&a, id(ss_img_widget));
                   if (sx != 0) {
                     lv_anim_set_exec_cb(&a, [](void* obj, int32_t v) { lv_obj_set_x((lv_obj_t*)obj, v); });
                     lv_anim_set_values(&a, sx, 0);
                   } else {
                     lv_anim_set_exec_cb(&a, [](void* obj, int32_t v) { lv_obj_set_y((lv_obj_t*)obj, v); });
                     lv_anim_set_values(&a, sy, 0);
                   }
                   lv_anim_set_duration(&a, (int)(id(ss_anim_ms).state * 2.0f));
                   lv_anim_start(&a);
                 } else {
                   // Instant: reset position/opa then reveal
                   lv_obj_set_x(id(ss_img_widget), 0);
                   lv_obj_set_y(id(ss_img_widget), 0);
                   lv_obj_set_style_opa(id(ss_img_widget), LV_OPA_COVER, 0);
                   lv_obj_clear_flag(id(ss_img_widget), LV_OBJ_FLAG_HIDDEN);
                 }
    on_error:
      then:
        - lambda: |-
            int photo_num = (!id(g_photo_order).empty() &&
                             id(g_photo_idx) < (int)id(g_photo_order).size())
              ? id(g_photo_order)[id(g_photo_idx)] : id(g_photo_idx) + 1;
            ESP_LOGW("ss", "Screensaver: photo %02d fetch failed", photo_num);

# ── 1s State Machine (Powerflow ↔ Screensaver) ───────────────
interval:
  - interval: 1s
    then:
      - lambda: |-
          if (!id(g_screensaver)) {
            // Slot cycling (Home Load + Battery) — both advance together every slot_cycle_secs
            if (--id(g_slot_secs) <= 0) {
              id(g_slot_secs) = (int)id(slot_cycle_secs).state;
              id(advance_slot).execute();
              id(advance_batt_slot).execute();
            }
            if (--id(g_pf_secs) <= 0) {
              if ((int)id(ss_photo_count).state > 0) {
                id(activate_screensaver).execute();
              } else {
                id(g_pf_secs) = (int)(id(ss_powerflow_mins).state * 60.0f);
              }
            }
            // Re-evaluate solar icon state every second when power = 0 (catches 18:00 / 06:00 transitions)
            if (id(g_solar_val) <= 0.0f)
              id(update_solar_icon_state).execute();
          } else {
            if (--id(g_photo_secs) <= 0) {
              id(g_photo_idx)++;
              if (id(g_photo_idx) >= (int)id(g_photo_order).size()) {
                id(deactivate_screensaver).execute();
              } else {
                auto tr = id(ss_transition).current_option();
                if      (tr == "Fade")        id(g_photo_trans) = 1;
                else if (tr == "Slide Left")  id(g_photo_trans) = 2;
                else if (tr == "Slide Right") id(g_photo_trans) = 3;
                else if (tr == "Slide Up")    id(g_photo_trans) = 4;
                else if (tr == "Slide Down")  id(g_photo_trans) = 5;
                else if (tr == "Random")      id(g_photo_trans) = (int)(esp_random() % 6);
                else                          id(g_photo_trans) = 0;  // None
                lv_obj_set_style_opa(id(ss_img_widget), LV_OPA_TRANSP, 0);  // prime for reveal: Fade starts from TRANSP; Slide overrides to COVER on arrival
                id(g_photo_secs) = (int)id(ss_photo_secs).state;
                int photo_num = id(g_photo_order)[id(g_photo_idx)];
                char url[92];
                snprintf(url, sizeof(url),
                  "${ha_url}/local/screensaver/%02d.jpg?r=%08X", photo_num, esp_random());
                static const char* tnames[] = {"Instant","Fade","Slide Left","Slide Right","Slide Up","Slide Down"};
                ESP_LOGW("ss", "Screensaver → photo %d [%s] — fetching %s",
                  photo_num, tnames[id(g_photo_trans)], url);
                id(ss_img).release();  // free old decoded image buffer BEFORE downloading next — prevents double-buffer OOM
                id(ss_img).set_url(url);
                id(ss_img).update();
              }
            }
          }

  # ── Battery SOC + Solar Icon Animation Tick ─────────────────
  # Battery: drives icon_battery glyph cycling every 1000ms (charging/discharging)
  #          and alert flashing every 250ms.
  # Solar:   drives icon_solar glyph ping-pong every 2000ms (states 1 and 2).
  # Skips both when LVGL is not ready or screensaver is active.
  # All glyph changes use lv_label_set_text_static() — glyph arrays are static const
  # char* in flash; no heap copy → eliminates free+malloc churn that would fragment
  # heap and reduce available contiguous memory for JPEG decode.
  #
  # Battery g_batt_anim_state:  0=static  1=charging(step up)  2=discharging(step down)  3=alert(flash)
  # Battery g_batt_anim_step:   glyph index 0=battery_full … 6=battery_0_bar
  # Solar   g_solar_anim_state: 0=static(cloudy)  1=glyph-cycle(producing)  2=glyph-cycle(night)
  # Solar   g_solar_anim_step:  state 1 → 0–7 sun ping-pong; state 2 → 0–4 moon cycle
  # s_tick: static counter incremented every 250ms; gates battery 1000ms (tick%4==0), solar 2000ms (tick%8==0)
  #
  # Battery glyph + color table (indices 0–7, icon_font_batt size 90):
  #   0  \ue1a4  battery_full   Green  0x00FF00   (SOC ≥98%)
  #   1  \uebd4  battery_5_bar  Green  0x00FF00   (SOC ≥85%)
  #   2  \uebe2  battery_4_bar  Blue   0x0096FF   (SOC ≥70%)
  #   3  \uebdd  battery_3_bar  Blue   0x0096FF   (SOC ≥55%)
  #   4  \uebe0  battery_2_bar  Yellow 0xFFFF00   (SOC ≥40%)
  #   5  \uebd9  battery_1_bar  Yellow 0xFFFF00   (SOC ≥25%)  ← Yellow (not Orange)
  #   6  \uebdc  battery_0_bar  Orange 0xFFA500   (SOC ≥10%)
  #   7  \ue19c  battery_alert  Orange 0xFFA500   (SOC <10%)
  # Solar glyph tables — State 1 icon_font (Material Icons, size 60):
  #   State 1 — Sun ping-pong (8 steps, Yellow 0xFFFF00):
  #   0  \uec0f  solar_power  — initial on entry
  #   1  \ue3ac  brightness_7
  #   2  \ue3a9  brightness_4
  #   3  \ue3ab  brightness_6
  #   4  \ue3aa  brightness_5  (peak)
  #   5  \ue3ab  brightness_6  (reverse)
  #   6  \ue3a9  brightness_4  (reverse)
  #   7  \ue3ac  brightness_7  (reverse)
  # Solar glyph tables — State 2 icon_font_moon (Material Symbols Outlined, size 60):
  #   State 2 — Moon cycle (5 steps, Blue 0x0096FF) on icon_solar_moon widget:
  #   0  \uf174  nights_stay  — initial on entry
  #   1  \uf34f  moon_stars
  #   2  \uf31d  star_shine
  #   3  \ue65f  auto_awesome (sparkles)
  #   4  \ue3e4  flare (starburst)
  - interval: 250ms
    then:
      - lambda: |-
          if (!id(g_lvgl_ready) || id(g_screensaver)) return;

          static int s_tick = 0;
          s_tick++;

          // ── Battery icon ─────────────────────────────────────────
          {
            int state = id(g_batt_anim_state);
            if (state == 0) {
              lv_obj_set_style_opa(id(icon_battery), LV_OPA_COVER, 0);  // safety: full opacity
            } else {
              static const char* const BATT_GLYPHS[] = {
                "\ue1a4", "\uebd4", "\uebe2", "\uebdd",
                "\uebe0", "\uebd9", "\uebdc", "\ue19c"
              };
              static const uint32_t BATT_COLORS[] = {
                0x00FF00, 0x00FF00, 0x0096FF, 0x0096FF,
                0xFFFF00, 0xFFFF00, 0xFFA500, 0xFFA500  // idx4=2bar idx5=1bar Yellow; idx6=0bar idx7=alert Orange
              };
              if (state == 3) {
                // Alert: flash battery_alert glyph on/off every 250ms
                lv_obj_set_style_opa(id(icon_battery),
                  (s_tick & 1) ? LV_OPA_COVER : LV_OPA_TRANSP, 0);
              } else if (s_tick % 4 == 0) {
                // Charging / Discharging: advance glyph every 1000ms
                float soc = id(g_batt_soc_val);
                int bstart = (soc >= 98) ? 0 : (soc >= 85) ? 1 : (soc >= 70) ? 2 :
                             (soc >= 55) ? 3 : (soc >= 40) ? 4 : (soc >= 25) ? 5 : 6;
                int bstep = id(g_batt_anim_step);
                if (state == 1) {
                  if (--bstep < 0) bstep = bstart;  // charging: up to full, wrap to SOC level
                } else {
                  if (++bstep > 6) bstep = bstart;  // discharging: down to 0_bar, wrap to SOC level
                }
                id(g_batt_anim_step) = bstep;
                lv_obj_set_style_opa(id(icon_battery), LV_OPA_COVER, 0);
                lv_label_set_text_static(id(icon_battery), BATT_GLYPHS[bstep]);
                lv_obj_set_style_text_color(id(icon_battery), lv_color_hex(BATT_COLORS[bstep]), 0);
              }
            }
          }

          // ── Solar icon (glyph ping-pong — state 1 sun / state 2 moon) ──────────────────
          {
            int solar_state = id(g_solar_anim_state);
            if ((solar_state == 1 || solar_state == 2) && s_tick % 8 == 0) {
              if (solar_state == 1) {
                static const char* const SUN_GLYPHS[] = {
                  "\uec0f", "\ue3ac", "\ue3a9", "\ue3ab",
                  "\ue3aa", "\ue3ab", "\ue3a9", "\ue3ac"
                };
                int sstep = (id(g_solar_anim_step) + 1) % 8;
                id(g_solar_anim_step) = sstep;
                lv_label_set_text_static(id(icon_solar), SUN_GLYPHS[sstep]);
                lv_obj_set_style_text_color(id(icon_solar), lv_color_hex(0xFFFF00), 0);
              } else {
                // State 2 — Moon cycle (5-step, Blue): nights_stay→moon_stars→star_shine→auto_awesome→flare
                static const char* const MOON_GLYPHS[] = {
                  "\uf174", "\uf34f", "\uf31d", "\ue65f", "\ue3e4"
                };
                int mstep = (id(g_solar_anim_step) + 1) % 5;
                id(g_solar_anim_step) = mstep;
                lv_label_set_text_static(id(icon_solar_moon), MOON_GLYPHS[mstep]);
                lv_obj_set_style_text_color(id(icon_solar_moon), lv_color_hex(0x0096FF), 0);
              }
            }
          }

# ── HA Controls: Display, Screensaver, Slot Cycling & Battery ─
number:
  - platform: template
    name: "Display Brightness"
    id: display_brightness
    entity_category: config
    min_value: 20
    max_value: 100
    step: 10
    initial_value: 50
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    on_value:
      then:
        - light.turn_on:
            id: backlight
            brightness: !lambda 'return x / 100.0f;'
            transition_length: 300ms

  - platform: template
    name: "Powerflow Mins"
    id: ss_powerflow_mins
    entity_category: config
    mode: box
    min_value: 1
    max_value: 15
    step: 1
    initial_value: 1
    restore_value: true
    optimistic: true
    unit_of_measurement: "min"
    on_value:
      then:
        - lambda: |-
            if (!id(g_screensaver))
              id(g_pf_secs) = (int)(x * 60.0f);

  - platform: template
    name: "Photo Secs"
    id: ss_photo_secs
    entity_category: config
    mode: box
    min_value: 1
    max_value: 15
    step: 1
    initial_value: 5
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"

  - platform: template
    name: "Photo Count"
    id: ss_photo_count
    entity_category: config
    mode: box
    min_value: 0
    max_value: 99
    step: 1
    initial_value: 17
    restore_value: true
    optimistic: true
    unit_of_measurement: "photos"

  - platform: template
    name: "Photos Per Cycle"
    id: ss_cycle_size
    entity_category: config
    mode: box
    min_value: 1
    max_value: 20
    step: 1
    initial_value: 3
    restore_value: true
    optimistic: true
    unit_of_measurement: "photos"

  # ── Screensaver Animation ─────────────────────────────────────
  # Controls page transition duration (enter + exit screensaver).
  # Per-photo transitions (Fade and Slide) use 2× this value for a smoother feel.
  # Lower = faster; higher = slower/more dramatic.
  - platform: template
    name: "Animation Duration"
    id: ss_anim_ms
    entity_category: config
    mode: box
    min_value: 500
    max_value: 2500
    step: 500
    initial_value: 1000
    restore_value: true
    optimistic: true
    unit_of_measurement: "ms"

  # ── Home Load & Battery Slot Cycling Controls ────────────────
  # slot_cycle_secs drives BOTH the Home Load slot and Battery slot timers (shared g_slot_secs).
  - platform: template
    name: "Slot Cycle Secs"
    id: slot_cycle_secs
    entity_category: config
    mode: box
    min_value: 1
    max_value: 15
    step: 1
    initial_value: 5
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    on_value:
      then:
        - lambda: 'id(g_slot_secs) = (int)x;'  # apply immediately

  - platform: template
    name: "Load 2 Threshold"
    id: load2_threshold
    entity_category: config
    mode: box
    min_value: 0
    max_value: 500
    step: 1
    initial_value: 10
    restore_value: true
    optimistic: true
    unit_of_measurement: "W"

  - platform: template
    name: "Load 3 Threshold"
    id: load3_threshold
    entity_category: config
    mode: box
    min_value: 0
    max_value: 500
    step: 1
    initial_value: 10
    restore_value: true
    optimistic: true
    unit_of_measurement: "W"

  # ── Battery Time Estimate Controls ───────────────────────────
  # Battery Capacity: used to compute remaining Ah and estimated time.
  - platform: template
    name: "Battery Capacity Ah"
    id: battery_capacity_ah
    entity_category: config
    mode: box
    min_value: 200
    max_value: 700
    step: 5
    initial_value: 300
    restore_value: true
    optimistic: true
    unit_of_measurement: "Ah"

  # Batt Time Threshold: only show time estimate when within this many hours of the limit.
  - platform: template
    name: "Batt Time Threshold"
    id: batt_time_threshold_hrs
    entity_category: config
    mode: box
    min_value: 1
    max_value: 48
    step: 1
    initial_value: 18
    restore_value: true
    optimistic: true
    unit_of_measurement: "h"

# ── Select Controls (HA) ──────────────────────────────────────
select:
  - platform: template
    name: "Transition Effect"
    id: ss_transition
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "Random"
    options:
      - "None"
      - "Fade"
      - "Slide Left"
      - "Slide Right"
      - "Slide Up"
      - "Slide Down"
      - "Random"

  - platform: template
    name: "Photo Order"
    id: ss_photo_order
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "Random"
    options:
      - "Sequential"
      - "Random"

# ── Switch Controls (HA) ──────────────────────────────────────
switch:
  # Toggle Battery Time Estimate slot on/off.
  # When OFF: Battery Power section always shows W/kW (slot 0 only).
  # When ON:  cycles to time estimate when within Batt Time Threshold hours of limit.
  - platform: template
    name: "Batt Time Estimate"
    id: batt_time_enabled
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_off:
      then:
        - lambda: |-
            if (id(g_batt_slot) == 1) {
              id(g_batt_slot) = 0;
              id(update_batt_display).execute();
            }
            // Immediately clear ETA sensors — bypasses the 60s throttle so HA
            // reflects the disabled state right away, not after the next publish window.
            float _soc  = id(g_batt_soc_val);
            float _cur  = id(g_batt_current_val);
            float _clim = id(g_srne_charge_limit_val);
            float _dlim = id(g_srne_discharge_limit_val);
            bool _chg = (_cur > 0.5f && _clim > _soc);
            bool _dis = (_cur < -0.5f && _soc > _dlim);
            id(batt_hours_to_full).publish_state(0.0f);
            id(batt_hours_to_empty).publish_state(0.0f);
            id(batt_full_at_min).publish_state(0.0f);
            id(batt_empty_at_min).publish_state(0.0f);
            id(batt_full_at_time).publish_state(
              (_soc >= _clim) ? std::string("Full") :
              _chg ? std::string("Charging") : std::string("Not Charging"));
            id(batt_empty_at_time).publish_state(
              (_soc <= _dlim) ? std::string("At Limit") :
              _dis ? std::string("Discharging") : std::string("Not Discharging"));

  # Controls all battery diagnostic logs: advance_batt_slot "disabled" state,
  # eligibility details, slot1→0 fallback, "Battery full/empty at" time estimate,
  # and invalid-time fallback. Fires every Slot Cycle Secs — turn OFF once correct.
  - platform: template
    name: "Batt Log Enabled"
    id: batt_log_enabled
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  # Controls all solar icon diagnostic logs: state transitions, PHT hour, is_night flag.
  # Turn OFF once animation is confirmed correct.
  - platform: template
    name: "Solar Log Enabled"
    id: solar_log_enabled
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

# Human-readable time strings for dashboard display (not graphable).
# Pair with batt_full_at_min / batt_empty_at_min for graphing.
# States:
#   Charging eligible  → "10:45 AM" (target wall-clock time in PHT)
#   Discharging eligible → "6:30 PM"
#   SOC at charge limit → "Full"
#   SOC at discharge limit → "At Limit"
#   Charging but estimate not shown (beyond threshold or disabled) → "Charging"
#   Discharging but estimate not shown → "Discharging"
#   No activity → "Not Charging" / "Not Discharging"
text_sensor:
  - platform: template
    name: "Battery Full At Time"
    id: batt_full_at_time

  - platform: template
    name: "Battery Empty At Time"
    id: batt_empty_at_time


# ── Load Label Controls (HA) ─────────────────────────────────
# Editable display labels for the 3 cycling slots (shown in top-right quadrant).
# Use only characters in label_font glyphs: A-Z a-z 0-9 and " .%/+-"
# on_value fires during NVS restore (before LVGL init) — g_lvgl_ready guard is inside update_slot_display.
text:
  - platform: template
    name: "Load 1 Label"
    id: load1_label
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: "Ecoflow River 3"
    mode: text
    max_length: 16
    on_value:
      then:
        - lambda: |-
            if (!id(g_screensaver) && id(g_slot_idx) == 2)
              id(update_slot_display).execute();

  - platform: template
    name: "Load 2 Label"
    id: load2_label
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: "A/C 1st Floor"
    mode: text
    max_length: 16
    on_value:
      then:
        - lambda: |-
            if (!id(g_screensaver) && id(g_slot_idx) == 0)
              id(update_slot_display).execute();

  - platform: template
    name: "Load 3 Label"
    id: load3_label
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: "A/C 2nd Floor"
    mode: text
    max_length: 16
    on_value:
      then:
        - lambda: |-
            if (!id(g_screensaver) && id(g_slot_idx) == 1)
              id(update_slot_display).execute();

# ── LVGL UI ───────────────────────────────────────────────────
# LVGL rotation: 270 → canvas becomes 320×240 (full landscape, no gaps)
# ── Active color palette ──────────────────────────────────────
# 0xFFFFFF  White   — static unit labels and time header
# 0x888888  Grey    — static title labels ("Solar Power", "Battery SOC", etc.)
# 0x00FF00  Green   — good / high / charging well / almost fully charged
# 0x0096FF  Blue    — medium
# 0xFFFF00  Yellow  — caution / idle / moderate
# 0xFFA500  Orange  — alert / discharging / low / long time until charged
# ──────────────────────────────────────────────────────────────

lvgl:
  displays:
    - lcd_display
  buffer_size: 10%
  rotation: 270
  pages:
    - id: main_page
      bg_color: 0x000000
      bg_opa: COVER
      scrollable: false
      widgets:

        # ── Header: Time ──────────────────────────────────────
        - label:
            id: lbl_time
            text: "--:--:-- --"
            text_font: header_font
            text_color: 0xFFFFFF
            align: CENTER
            y: -106

        # ── Divider Horizontal ────────────────────────────────
        - line:
            points:
              - 0, 34
              - 320, 34
            line_color: 0x333333
            line_width: 1

        # ── Battery Power (middle) ────────────────────────────
        - obj:
            x: 0
            y: 18
            width: 320
            height: 200
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            align: CENTER
            scrollable: false
            widgets:
              - label:
                  id: lbl_batt_title
                  text: "Battery Power"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  y: -26
              - label:
                  id: val_battery_power
                  text: "8.88"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
              - label:
                  id: val_battery_power_unit
                  text: "W"
                  text_font: label_font
                  text_color: 0xFFFFFF
                  align: CENTER
                  y: 26

        # ── PV (top-left) ─────────────────────────────────────
        - obj:
            x: 0
            y: 25
            width: 160
            height: 95
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  id: icon_solar
                  text: "\uec0f"
                  text_font: icon_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: -55
              # Moon animation label — Material Symbols font; shown only in state 2 (night)
              # Same position as icon_solar; icon_solar hidden when this is visible
              - label:
                  id: icon_solar_moon
                  text: "\uf174"
                  text_font: icon_font_moon
                  text_color: 0x0096FF
                  align: CENTER
                  x: -55
                  hidden: true
              - label:
                  text: "Solar Power"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: 20
                  y: -26
              - label:
                  id: val_solar
                  text: "8.88"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: 20
                  y: 0
              - label:
                  id: val_solar_unit
                  text: "W"
                  text_font: label_font
                  text_color: 0xFFFFFF
                  align: CENTER
                  x: 20
                  y: 26

        # ── Battery (bottom-left) ─────────────────────────────
        - obj:
            x: 0
            y: 160
            width: 160
            height: 95
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  id: icon_battery
                  text: "\ue1a4"
                  text_font: icon_font_batt
                  text_color: 0xFFFF00
                  align: CENTER
                  x: -60
                  y: -10
              - label:
                  text: "Battery SOC"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: 20
                  y: -26
              - label:
                  id: val_battery
                  text: "88.8"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: 20
                  y: 0
              - label:
                  text: "%"
                  text_font: label_font
                  text_color: 0xFFFFFF
                  align: CENTER
                  x: 20
                  y: 26

        # ── Home Load Slots (top-right) — cycles: Load 2 → Load 3 → Load 1 ──
        # Slot visible only when sensor value > threshold (Load 1 always shown).
        # Icon and labels are updated by update_slot_display script.
        - obj:
            x: 160
            y: 25
            width: 160
            height: 95
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              # Slot icon — shown for Load 2 and Load 3 slots (default: snowflake \ueb3b; change in icon_font glyphs + here)
              - label:
                  id: icon_slot
                  text: "\ueb3b"
                  text_font: icon_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: 55
              # Load 1 icon (Material Icons electrical_services \ue63c) — shown for Load 1 Power slot
              # Replace with a different glyph codepoint and add it to icon_font glyphs list
              - label:
                  id: icon_load1
                  text: "\ue63c"
                  text_font: icon_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: 55
                  hidden: true
              - label:
                  id: lbl_slot
                  text: "Load 2"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: -20
                  y: -26
              - label:
                  id: val_slot
                  text: "8.88"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: -20
                  y: 0
              - label:
                  id: val_slot_unit
                  text: "W"
                  text_font: label_font
                  text_color: 0xFFFFFF
                  align: CENTER
                  x: -20
                  y: 26

        # ── Home Load (bottom-right) ─────────────────────────
        - obj:
            x: 160
            y: 160
            width: 160
            height: 95
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  id: icon_home
                  text: "\ue88a"
                  text_font: icon_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: 55
              - label:
                  text: "Home Load"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: -20
                  y: -26
              - label:
                  id: val_home
                  text: "8.88"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: -20
                  y: 0
              - label:
                  id: val_home_unit
                  text: "VA"
                  text_font: label_font
                  text_color: 0xFFFFFF
                  align: CENTER
                  x: -20
                  y: 26

    # ── Screensaver Page ──────────────────────────────────────
    # Black canvas. scale: 2.5 upscales a 128×96 photo to fill
    # the full 320×240 screen (128×2.5=320, 96×2.5=240 exact).
    # antialias: false avoids heavy SW transform work that would
    # trigger the 30ms loop warning.
    - id: screensaver_page
      bg_color: 0x000000
      bg_opa: COVER
      scrollable: false
      widgets:
        - image:
            id: ss_img_widget
            src: ss_img
            align: CENTER
            scale: 2.5
            antialias: false
